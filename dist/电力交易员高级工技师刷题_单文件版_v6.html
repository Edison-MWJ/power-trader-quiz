<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14213d">
  <title>电力交易刷题</title>
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIiByb2xlPSJpbWciIGFyaWEtbGFiZWw9IueUteWKm+S6pOaYk+WRmOWIt+mimCI+CiAgPHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMTIiIGZpbGw9IiMxNDIxM2QiLz4KICA8cGF0aCBkPSJNMTM4IDExOGgyMzZjMjAgMCAzNiAxNiAzNiAzNnYyNDBjMCAyMC0xNiAzNi0zNiAzNkgxMzhjLTIwIDAtMzYtMTYtMzYtMzZWMTU0YzAtMjAgMTYtMzYgMzYtMzZaIiBmaWxsPSIjZjhmNGU4Ii8+CiAgPHBhdGggZD0iTTE1NCAxODRoMjA0TTE1NCAyNDZoMTMyTTE1NCAzMDhoMTc4IiBzdHJva2U9IiMxNDIxM2QiIHN0cm9rZS13aWR0aD0iMjgiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgogIDxwYXRoIGQ9Ik0zMTYgMjIyIDI2MCAzMzJoNjJsLTIyIDcyIDgyLTEyNGgtNjJsMjgtNThoLTMyWiIgZmlsbD0iI2ZjYTMxMSIvPgogIDxjaXJjbGUgY3g9IjM3OCIgY3k9IjE1MCIgcj0iMzQiIGZpbGw9IiMyYTlkOGYiLz4KPC9zdmc+Cg==" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --ink: #14213d;
      --paper: #f8f4e8;
      --panel: #fffdf6;
      --line: #d9d1bf;
      --muted: #6f6a60;
      --green: #2a9d8f;
      --amber: #fca311;
      --red: #d1495b;
      --blue: #277da1;
      --shadow: 0 18px 50px rgba(20, 33, 61, .14);
      font-family: "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(20, 33, 61, .045) 1px, transparent 1px),
        linear-gradient(0deg, rgba(20, 33, 61, .035) 1px, transparent 1px),
        var(--paper);
      background-size: 22px 22px;
      color: var(--ink);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 920px);
      margin: 0 auto;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 14px calc(16px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0 10px;
      background: linear-gradient(180deg, var(--paper) 78%, rgba(248, 244, 232, 0));
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand img {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-family: Georgia, "Songti SC", serif;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-size: 13px;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 8px 0 12px;
    }

    .stat {
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 246, .86);
      box-shadow: 0 8px 20px rgba(20, 33, 61, .06);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .view-switch {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      padding: 4px;
      margin-bottom: 12px;
      background: #ece3cf;
    }

    .view-switch button {
      min-height: 42px;
      border-radius: 7px;
      background: transparent;
      color: var(--ink);
      font-weight: 800;
      transition: transform .12s ease, background .12s ease, color .12s ease;
    }

    .view-switch button.active {
      background: var(--ink);
      color: white;
    }

    .controls {
      display: grid;
      gap: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .segments {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(58px, 1fr));
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ece3cf;
    }

    .segments button,
    .filter button,
    .scope-filter button,
    .exam-source button,
    .answer-sheet button,
    .small-button {
      min-height: 38px;
      border-radius: 7px;
      color: var(--ink);
      background: transparent;
      transition: transform .12s ease, background .12s ease, color .12s ease;
    }

    .segments button.active,
    .filter button.active,
    .scope-filter button.active,
    .exam-source button.active {
      background: var(--ink);
      color: white;
    }

    .filter,
    .scope-filter,
    .exam-source {
      display: grid;
      gap: 6px;
    }

    .filter {
      grid-template-columns: repeat(4, 1fr);
    }

    .scope-filter {
      grid-template-columns: repeat(3, 1fr);
    }

    .exam-source {
      grid-template-columns: repeat(1, 1fr);
    }

    .filter button,
    .scope-filter button,
    .exam-source button {
      border: 1px solid var(--line);
      background: white;
      font-size: 13px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .search-row input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .small-button {
      border: 1px solid var(--line);
      background: white;
      padding: 0 12px;
    }

    .small-button.compact {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .question {
      overflow: hidden;
    }

    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #fff8e6;
    }

    .tag-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 8px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(42, 157, 143, .12);
      color: #16675e;
    }

    .tag.multi { background: rgba(252, 163, 17, .18); color: #8a5600; }
    .tag.judge { background: rgba(39, 125, 161, .14); color: #17536c; }
    .tag.scope { background: rgba(209, 73, 91, .10); color: #8c2736; }

    .progress-text {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .stem {
      padding: 18px 14px 12px;
      font-size: 20px;
      line-height: 1.55;
      font-weight: 800;
      word-break: break-word;
    }

    .options {
      display: grid;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .option {
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: start;
      gap: 10px;
      width: 100%;
      min-height: 54px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      text-align: left;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    .option:active,
    .view-switch button:active,
    .segments button:active,
    .filter button:active,
    .scope-filter button:active,
    .exam-source button:active,
    .answer-sheet button:active,
    .small-button:active,
    .primary:active,
    .ghost:active {
      transform: translateY(1px);
    }

    .option.selected {
      border-color: var(--blue);
      background: rgba(39, 125, 161, .09);
    }

    .option.correct {
      border-color: var(--green);
      background: rgba(42, 157, 143, .13);
    }

    .option.wrong {
      border-color: var(--red);
      background: rgba(209, 73, 91, .10);
    }

    .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 800;
    }

    .option-text {
      padding-top: 5px;
      line-height: 1.45;
      word-break: break-word;
    }

    .feedback {
      margin: 0 14px 14px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff8e6;
      line-height: 1.55;
    }

    .feedback.good {
      border-color: rgba(42, 157, 143, .45);
      background: rgba(42, 157, 143, .10);
    }

    .feedback.bad {
      border-color: rgba(209, 73, 91, .45);
      background: rgba(209, 73, 91, .10);
    }

    .exam-rule,
    .exam-history,
    .exam-analysis,
    .exam-summary {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .exam-rule strong,
    .exam-history strong,
    .exam-analysis strong,
    .exam-summary strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 14px;
    }

    .exam-score {
      padding: 22px 16px 12px;
      text-align: center;
    }

    .exam-score strong {
      display: block;
      font-family: Georgia, "Songti SC", serif;
      font-size: 52px;
      line-height: 1;
      color: var(--ink);
    }

    .exam-score span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .exam-breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 14px 14px;
    }

    .exam-breakdown div {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff8e6;
      text-align: center;
    }

    .exam-breakdown strong {
      display: block;
      font-size: 18px;
    }

    .exam-breakdown span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .answer-sheet {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(31px, 1fr));
      gap: 5px;
      padding: 0 14px 14px;
    }

    .answer-sheet button {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
    }

    .answer-sheet button.current {
      border-color: var(--ink);
      background: var(--ink);
      color: white;
    }

    .answer-sheet button.answered {
      border-color: rgba(42, 157, 143, .55);
      background: rgba(42, 157, 143, .12);
    }

    .answer-sheet button.marked {
      border-color: rgba(252, 163, 17, .8);
      box-shadow: inset 0 -3px 0 rgba(252, 163, 17, .65);
    }

    .review-list {
      display: grid;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .review-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      line-height: 1.55;
      font-size: 14px;
    }

    .review-item strong {
      display: block;
      margin-bottom: 6px;
    }

    .inline-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 14px 14px;
    }

    .actions {
      position: static;
      z-index: 8;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: rgba(248, 244, 232, .94);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .primary,
    .ghost {
      min-height: 52px;
      border-radius: 8px;
      font-weight: 800;
    }

    .primary {
      background: var(--amber);
      color: #241706;
    }

    .primary:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    .ghost:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    .ghost {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
    }

    .hidden {
      display: none !important;
    }

    .empty {
      padding: 28px 18px;
      text-align: center;
      line-height: 1.6;
      color: var(--muted);
    }

    .drawer {
      display: none;
      margin-top: 12px;
      padding: 12px;
    }

    .drawer.open {
      display: block;
    }

    .drawer h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .drawer p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    @media (min-width: 720px) {
      .app {
        padding-left: 24px;
        padding-right: 24px;
      }

      .layout {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 14px;
        align-items: start;
      }

      .controls {
        position: sticky;
        top: 74px;
      }

      .stem {
        font-size: 24px;
        padding: 24px 22px 16px;
      }

      .options {
        padding: 0 22px 22px;
      }

      .feedback {
        margin: 0 22px 22px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIiByb2xlPSJpbWciIGFyaWEtbGFiZWw9IueUteWKm+S6pOaYk+WRmOWIt+mimCI+CiAgPHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMTIiIGZpbGw9IiMxNDIxM2QiLz4KICA8cGF0aCBkPSJNMTM4IDExOGgyMzZjMjAgMCAzNiAxNiAzNiAzNnYyNDBjMCAyMC0xNiAzNi0zNiAzNkgxMzhjLTIwIDAtMzYtMTYtMzYtMzZWMTU0YzAtMjAgMTYtMzYgMzYtMzZaIiBmaWxsPSIjZjhmNGU4Ii8+CiAgPHBhdGggZD0iTTE1NCAxODRoMjA0TTE1NCAyNDZoMTMyTTE1NCAzMDhoMTc4IiBzdHJva2U9IiMxNDIxM2QiIHN0cm9rZS13aWR0aD0iMjgiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPgogIDxwYXRoIGQ9Ik0zMTYgMjIyIDI2MCAzMzJoNjJsLTIyIDcyIDgyLTEyNGgtNjJsMjgtNThoLTMyWiIgZmlsbD0iI2ZjYTMxMSIvPgogIDxjaXJjbGUgY3g9IjM3OCIgY3k9IjE1MCIgcj0iMzQiIGZpbGw9IiMyYTlkOGYiLz4KPC9zdmc+Cg==" alt="">
        <div>
          <h1>电力交易刷题</h1>
          <p id="metaText">题库加载中</p>
        </div>
      </div>
    </header>

    <section class="stats" aria-label="刷题统计">
      <div class="stat"><strong id="doneCount">0</strong><span id="doneLabel">已答题</span></div>
      <div class="stat"><strong id="accuracy">0%</strong><span id="accuracyLabel">正确率</span></div>
      <div class="stat"><strong id="wrongCount">0</strong><span id="wrongLabel">错题本</span></div>
    </section>

    <section class="panel view-switch" aria-label="功能模式">
      <button data-view="practice" class="active">日常刷题</button>
      <button data-view="exam">模拟考试</button>
    </section>

    <main class="layout">
      <section class="panel controls" id="practiceControls" aria-label="练习设置">
        <div class="segments" role="tablist" aria-label="练习模式">
          <button data-mode="random" class="active">随机</button>
          <button data-mode="order">顺序</button>
          <button data-mode="wrong">错题</button>
          <button data-mode="favorite">收藏</button>
          <button data-mode="weak">薄弱</button>
        </div>
        <div class="filter" aria-label="题型筛选">
          <button data-filter="all" class="active">全部</button>
          <button data-filter="单选">单选</button>
          <button data-filter="多选">多选</button>
          <button data-filter="判断">判断</button>
        </div>
        <div class="scope-filter" aria-label="题库来源筛选">
          <button data-source="高级工" class="active">高级工</button>
          <button data-source="技师">技师</button>
          <button data-source="技师新增">技师新增</button>
        </div>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜索题干关键词">
          <button class="small-button" id="resetButton">重置</button>
        </div>
      </section>

      <section class="panel controls hidden" id="examControls" aria-label="模拟考试设置">
        <div class="exam-rule">
          <strong>模拟考试规则</strong>
          单选 50 题，每题 1 分；多选 15 题，每题 2 分；判断 20 题，每题 1 分。共 85 题，满分 100 分，限时 120 分钟。
        </div>
        <div class="exam-source" aria-label="考试题库来源">
          <button data-exam-source="高级工" class="active">高级工</button>
          <button data-exam-source="技师">技师</button>
          <button data-exam-source="技师新增">技师新增</button>
        </div>
        <button class="primary" id="startExamButton">开始模拟考试</button>
        <div class="exam-analysis" id="examAnalysis"></div>
        <div class="exam-history" id="examHistory"></div>
      </section>

      <section>
        <article class="panel question" id="questionCard" aria-live="polite"></article>
      </section>
    </main>

    <nav class="actions" aria-label="答题操作">
      <button class="ghost" id="skipButton">跳过</button>
      <button class="primary" id="submitButton" disabled>提交答案</button>
    </nav>

"levels":["高级工"],"scope":"高级工独有","id":"Q0102"},{"stem":"在电力市场的出清方式中，（）方式是最常见的，并且所有成交的市场成员都按照此价格结算。","type":"单选","options":[{"label":"A","text":"统一出清"},{"label":"B","text":"简单撮合出清"},{"label":"C","text":"复杂撮合出清"},{"label":"D","text":"不完全分配"}],"answer":["A"],"levels":["高级工"],"scope":"高级工独有","id":"Q0103"},{"stem":"澳大利亚电力辅助服务市场中与电能量市场联合出清的是()","type":"单选","options":[{"label":"A","text":"调频"},{"label":"B","text":"调压"},{"label":"C","text":"调载"},{"label":"D","text":"黑启动"}],"answer":["A"],"levels":["高级工"],"scope":"高级工独有","id":"Q0104"},{"stem":"截止2023年底，我国清洁能源发电装机容量约占发电装机总量的（）。","type":"单选","options":[{"label":"A","text":"0.18"},{"label":"B","text":"0.38"},{"label":"C","text":"0.58"},{"label":"D","text":"0.78"}],"answer":["C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0105"},{"stem":"在变电站的一次系统中，以下（）设备不属于母线设备。","type":"单选","options":[{"label":"A","text":"母线"},{"label":"B","text":"母线隔离开关"},{"label":"C","text":"母线电压互感器"},{"label":"D","text":"断路器"}],"answer":["D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0106"},{"stem":"在电力系统中，二次系统主要负责监控、控制和保护，并与一次系统进行通信。以下（）功能不是二次系统直接负责的。","type":"单选","options":[{"label":"A","text":"实时测量电力设备的工作状态"},{"label":"B","text":"远程控制断路器的开合"},{"label":"C","text":"维持发电机的最佳运行状态"},{"label":"D","text":"记录电力系统的故障信息"}],"answer":["C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0107"},{"stem":"选择高压直流输电系统的主要优势是（）。","type":"单选","options":[{"label":"A","text":"高压直流输电系统能够减少电力损耗，特别是在长距离输电中。"},{"label":"B","text":"高压直流输电系统的设备成本低于交流输电系统。"},{"label":"C","text":"高压直流输电系统在输电过程中不需要变电站进行电压变换。"},{"label":"D","text":"高压直流输电系统可以更方便地与现有的交流电网集成。"}],"answer":["A"],"levels":["高级工"],"scope":"高级工独有","id":"Q0108"},{"stem":"在同一个（）电网中，各个节点的频率一定相同。","type":"单选","options":[{"label":"A","text":"交流互联电网"},{"label":"B","text":"交直流互联电网"},{"label":"C","text":"国家电网"},{"label":"D","text":"南方电网"}],"answer":["A"],"levels":["高级工"],"scope":"高级工独有","id":"Q0109"},{"stem":"对于一个标准的交流输电线路，其A\B\C三相电压说法正确的是（）。","type":"单选","options":[{"label":"A","text":"电压和相角都相同"},{"label":"B","text":"电压幅值相同，相角差距120度"},{"label":"C","text":"电压幅值和相角都不相同"},{"label":"D","text":"电压幅值不同，没有相角差"}],"answer":["B"],"levels":["高级工"],"scope":"高级工独有","id":"Q0110"},{"stem":"在居民家庭用电中，有220V和380V的不同用电设备。以下说法正确的是（）。","type":"单选","options":[{"label":"A","text":"220V是接地设备，380V是不接地设备"},{"label":"B","text":"220V是直流设备，380V是交流设备"},{"label":"C","text":"220V是单相设备，380V是三相设备"},{"label":"D","text":"220V是专供家用电器，380V是专供非家用电器"}],"answer":["C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0111"},{"stem":"我国的交流电网标准频率是50HZ。以下说法正确的是：","type":"单选","options":[{"label":"A","text":"当系统用电负荷大于系统发电出力时，电网频率会瞬间下降。"},{"label":"B","text":"当电网频率上升时，发电机应增加发电出力。"},{"label":"C","text":"电网频率的事故偏差范围是正负10%。"},{"label":"D","text":"电网频率的事故偏差范围是正负5%"}],"answer":["A"],"levels":["高级工"],"scope":"高级工独有","id":"Q0112"},{"stem":"下列（）是新型电力系统中的关键组成部分，能够通过集成现代通信和信息技术实现电力系统的智能化运行和管理，并具备自愈能力和网络安全保护。","type":"单选","options":[{"label":"A","text":"分布式能源"},{"label":"B","text":"微电网"},{"label":"C","text":"能源互联网"},{"label":"D","text":"智能电网"}],"answer":["D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0113"},{"stem":"在电网潮流计算中，关于用电负荷，以下说法正确的是（）","type":"单选","options":[{"label":"A","text":"同一个计算母线下的用电设备，可以等值成一个用电设备进行计算；"},{"label":"B","text":"用电负荷节点又称PV节点；"},{"label":"C","text":"输电线路的损耗只和用电负荷的有功功率大小有关；"},{"label":"D","text":"用电负荷的无功功率不影响潮流的走向。"}],"answer":["A"],"levels":["高级工"],"scope":"高级工独有","id":"Q0114"},{"stem":"如某省现货规则规定采用全电量出清，并只计算220kV及以上节点和联络线的潮流。以下说法正确的是（）：","type":"单选","options":[{"label":"A","text":"该省没有低于220kV的输配电网络；"},{"label":"B","text":"接入低于220kV的发用电设备可以简化忽略计算；"},{"label":"C","text":"220kV以下输电线路开环运行，其用电负荷等值到220kV节点；"},{"label":"D","text":"220kV及以上节点按照不同电压等级分别计算潮流。"}],"answer":["C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0115"},{"stem":"直流潮流分析是一种（）的潮流计算方法。","type":"单选","options":[{"label":"A","text":"假设系统的线路阻抗主要是电容性的；"},{"label":"B","text":"忽略线路的电感效应；"},{"label":"C","text":"假定所有的电压幅值相等、相位差很小；"},{"label":"D","text":"可以准确反映电力系统的实际运行状态"}],"answer":["C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0116"},{"stem":"前推回代法是（）的计算方法","type":"单选","options":[{"label":"A","text":"当矩阵被简化为上三角形状后，使用前推法来求解未知数；"},{"label":"B","text":"在矩阵为下三角形状时使用回代法求解；"},{"label":"C","text":"已知配电网的始端电压和末端负荷，以馈线为基本计算单位；"},{"label":"D","text":"假设全网电压都为统一的基准电压进行计算。"}],"answer":["C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0117"},{"stem":"关于潮流灵敏度矩阵的讨论，不正确的是（）","type":"单选","options":[{"label":"A","text":"只调整部分发电机的电压，无功充足能维持电压不变的发电机，可以划去发电机电压能维持不变的节点对应的列；"},{"label":"B","text":"被控量为部分负荷节点，即其它负荷节点的电压不关心，可高斯消去不关心电压变化的负荷节点；"},{"label":"C","text":"无功已达界的发电机，可以作为控制变量。"},{"label":"D","text":"高斯消去是等值变换，直接划去是不考虑它的影响。"}],"answer":["C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0118"},{"stem":"频率调整是电力市场辅助服务的重要内容，以下说法正确的是：","type":"单选","options":[{"label":"A","text":"虚拟电厂可以参与调频服务；"},{"label":"B","text":"电网公共侧储能的调频响应能力总体上不如燃煤发电机组；"},{"label":"C","text":"调频辅助服务由发电机组的二次调频提供；"},{"label":"D","text":"调频辅助服务由发电机组的三次调频提供。"}],"answer":["C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0119"},{"stem":"电网的稳定可以分为静态稳定和暂态稳定。以下说法正确的是（）。","type":"单选","options":[{"label":"A","text":"发电企业并网的输电线路，暂态稳定限额数值上高于静态稳定限额;"},{"label":"B","text":"静态稳定通常理解为输电线路单相故障后保持稳定的能力；"},{"label":"C","text":"暂态稳定通常可以理解为电网受到一个较小的扰动后保持稳定的能力；"},{"label":"D","text":"现货市场社会福利最大化的出清中，需要暂态稳定限额用于约束条件。"}],"answer":["D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0120"},{"stem":"在非现货模式下，中长期交易结算中，合同偏差电量的处理方式不包括：","type":"单选","options":[{"label":"A","text":"实时调整方式"},{"label":"B","text":"滚动调整方式"},{"label":"C","text":"等比例调整方式"},{"label":"D","text":"预挂牌月平衡偏差方式"}],"answer":["A"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0121"},{"stem":"非现货市场零售用户A与售电公司B签订了零售合同，单月合同电量100兆瓦时，合同电量部分内用电价格为390元/兆瓦时、超用电量部分用电价格为400元/兆瓦时、少用电量部分价格为380元/兆瓦时，则：零售用户实际用电量110兆瓦时，则零售用户A需要向售电公司B支付的费用（）。","type":"单选","options":[{"label":"A","text":"39000"},{"label":"B","text":"43000"},{"label":"C","text":"45200"},{"label":"D","text":"43600"}],"answer":["B"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0122"},{"stem":"非现货市场发电企业A某交易周期内的中长期合同电量为100兆瓦时，中长期交易合同加权价格为350元/兆瓦时，实际上网电量为110兆瓦时，偏差率在5%以内时K1为0.95、5%以外时K1为0.9，则：当月调用了下调服务，发电侧下调服务电量的加权平均价为380元/兆瓦时，发电企业A的偏差电量电费（）元。","type":"单选","options":[{"label":"A","text":"2970"},{"label":"B","text":"3560"},{"label":"C","text":"3180"},{"label":"D","text":"3420"}],"answer":["D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0123"},{"stem":"若尚未安装副表，或当主副表计同时发生故障时，以可替代的计量表计记录的数据计算必要的电量（线损、变损、厂用电等）后作为（）。","type":"单选","options":[{"label":"A","text":"替代电量数据"},{"label":"B","text":"结算数据"},{"label":"C","text":"计量数据"},{"label":"D","text":"交易数据"}],"answer":["A"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0124"},{"stem":"对于同时装有主、副表的计量点，以主表计量电能数据作为（）结算依据，副表电能计量数据作为参照。","type":"单选","options":[{"label":"A","text":"计量依据"},{"label":"B","text":"结算依据"},{"label":"C","text":"交易依据"},{"label":"D","text":"支付依据"}],"answer":["B"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0125"},{"stem":"电网企业应按照电力市场结算要求定期抄录发电企业（机组）和电力用户电能计量装置数据，并提交（）。","type":"单选","options":[{"label":"A","text":"电力用户"},{"label":"B","text":"售电公司"},{"label":"C","text":"政府部门"},{"label":"D","text":"电力交易机构"}],"answer":["D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0126"},{"stem":"在预测电力市场未来电价时，以下（）方法通常被认为是最为科学的。","type":"单选","options":[{"label":"A","text":"基于历史数据的趋势分析"},{"label":"B","text":"询问市场参与者的意见"},{"label":"C","text":"依赖交易员的直觉判断"},{"label":"D","text":"使用随机模型进行预测"}],"answer":["A"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0127"},{"stem":"市场主体对披露的市场信息有异议或疑问，可向（）提出。","type":"单选","options":[{"label":"A","text":"能源监管机构"},{"label":"B","text":"政府部门"},{"label":"C","text":"电力交易组织"},{"label":"D","text":"电力交易机构"}],"answer":["D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0128"},{"stem":"市场运营机构应当披露的公众信息包括（）。","type":"单选","options":[{"label":"A","text":"电力交易机构全称、工商注册时间、股权结构"},{"label":"B","text":"统一社会信用代码、法定代表人、服务电话"},{"label":"C","text":"办公地址、网站网址等"},{"label":"D","text":"以上都是"}],"answer":["D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0129"},{"stem":"信息披露平台应具有()、黑名单管理、发布提醒等功能。","type":"单选","options":[{"label":"A","text":"关键词自动检索"},{"label":"B","text":"计算机术语自动检索"},{"label":"C","text":"金融专业词自动检索"},{"label":"D","text":"电力设备词自动检索"}],"answer":["A"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0130"},{"stem":"在电力市场分析中，以下（）因素对短期市场电价影响最大。","type":"单选","options":[{"label":"A","text":"季节性负荷变化"},{"label":"B","text":"燃料价格波动"},{"label":"C","text":"电网维护计划"},{"label":"D","text":"政策法规变动"}],"answer":["B"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0131"},{"stem":"当分析电力市场趋势时，以下（）情况通常预示着市场供过于求。","type":"单选","options":[{"label":"A","text":"交易电价持续上升"},{"label":"B","text":"交易电量逐渐减少"},{"label":"C","text":"电网负荷率低于平均水平"},{"label":"D","text":"市场参与者增多"}],"answer":["C"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0132"},{"stem":"在进行电力市场分析时，以下（）指标最能直接反映市场供需关系。","type":"单选","options":[{"label":"A","text":"市场交易电量"},{"label":"B","text":"市场交易电价"},{"label":"C","text":"市场供应商数量"},{"label":"D","text":"市场用户数量"}],"answer":["B"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0133"},{"stem":"当交易员在填报现货交易数据时，以下（）是需要特别注意的。","type":"单选","options":[{"label":"A","text":"交易电量必须等于市场规定的交易单元"},{"label":"B","text":"交易电价必须高于市场历史最高价"},{"label":"C","text":"交易时间必须在市场规定的交易时段内"},{"label":"D","text":"交易对手必须是预先指定的企业"}],"answer":["C"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0134"},{"stem":"在滚动撮合交易中，以下（）操作是交易员应当优先考虑的。","type":"单选","options":[{"label":"A","text":"尽可能以最高价买入，最低价卖出"},{"label":"B","text":"根据市场供需情况灵活调整交易策略"},{"label":"C","text":"专注于单一交易品种，不考虑其他市场机会"},{"label":"D","text":"忽略市场规则，追求交易量最大化"}],"answer":["B"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0135"},{"stem":"在电力交易中，关于风险控制，以下（）说法是正确的。","type":"单选","options":[{"label":"A","text":"交易员可以忽略市场波动对交易的影响"},{"label":"B","text":"交易员应当设置合理的止损点以控制损失"},{"label":"C","text":"交易员应当将所有交易资金用于单一交易品种以最大化收益"},{"label":"D","text":"交易员不需要对市场风险进行定期评估"}],"answer":["B"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0136"},{"stem":"在进行年度双边协商交易时，交易员在填报量价数据时应该注意：","type":"单选","options":[{"label":"A","text":"交易电量必须超过市场规定的最大交易单位"},{"label":"B","text":"交易电价不得低于市场规定的最低限价"},{"label":"C","text":"交易双方必须在交易前公开协商细节"},{"label":"D","text":"交易合同必须在规定时间内完成线上签订"}],"answer":["D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0137"},{"ste "levels":["高级工"],"scope":"高级工独有","id":"Q0700"},{"stem":"美国PJM市场中金融输电权的获取途径包括（）","type":"多选","options":[{"label":"A","text":"中长期FTR拍卖"},{"label":"B","text":"年度FTR拍卖"},{"label":"C","text":"月度FTR拍卖"},{"label":"D","text":"FTR二级市场"},{"label":"E","text":"FTR三级市场"}],"answer":["A","B","C","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0701"},{"stem":"PJM辅助服务交易品种主要包含（）","type":"多选","options":[{"label":"A","text":"备用"},{"label":"B","text":"调频"},{"label":"C","text":"无功和电压控制服务"},{"label":"D","text":"黑启动"},{"label":"E","text":"惯量响应"}],"answer":["A","B","C","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0702"},{"stem":"关于发电机组的AGC控制，以下说法正确的是（）","type":"多选","options":[{"label":"A","text":"AGC的中文全程是自动发电控制"},{"label":"B","text":"调度中心可以通过AGC控制执行SCED的结果"},{"label":"C","text":"AGC可以执行调频服务指令"},{"label":"D","text":"AGC可以完成一次调频"},{"label":"E","text":"AGC技术常见在新能源发电设备中。"}],"answer":["A","B","C","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0703"},{"stem":"下列关于边际机组出力说法正确的有（）。","type":"多选","options":[{"label":"A","text":"如果一个竞价问题出现多个最优解，这意味着某些机组的报价是相同的"},{"label":"B","text":"总负荷减去非边际机组出力总和为剩余负荷"},{"label":"C","text":"机组调度结果可通过剩余负荷及机组各自的出力上限计算确定"},{"label":"D","text":"发电机组按其申报容量比例进行调度"},{"label":"E","text":"边际机组的出力始终等于其申报容量"}],"answer":["A","B","C","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0704"},{"stem":"在电力市场中，关于报价的要求，下列哪些选项是常见的规范（）","type":"多选","options":[{"label":"A","text":"用户报价必须是单调递增的，发电报价必须是单调递降的"},{"label":"B","text":"市场可能会限制每个市场参与者最多可以申报的分段数，例如一段、三段、五段等"},{"label":"C","text":"允许所有市场参与者随意选择报价曲线的类型，无需遵循市场规则"},{"label":"D","text":"一些市场会对报价的价格范围进行限制，例如设定最低报价和最高报价"},{"label":"E","text":"可能会规定每段报价的电量不能小于一定的值，以限制市场力"}],"answer":["B","D","E"],"levels":["高级工"],"scope":"高级工独有","id":"Q0705"},{"stem":"关于拍卖问题的基本理论，以下哪些描述是正确的（）","type":"多选","options":[{"label":"A","text":"在英国式拍卖和第二价格暗标拍卖中，风险规避问题对投标者的投标策略没有影响，其最优策略仍以商品的真实价值投标。"},{"label":"B","text":"无论采用哪种拍卖方式，拍卖价格的最终结果总是不同的。"},{"label":"C","text":"收益等价定理要求拍卖参与者的估价信息是完全对称的、独立的，并且参与者都是风险中性的。"},{"label":"D","text":"在有信息关联的情况下，英式拍卖导致比第二价格暗标拍卖更高的期望价格，后者又导致比第一价格暗标拍卖更高的期望价格。"},{"label":"E","text":"收益等价定理适用于所有拍卖类型，包括存在风险规避和信息关联的情况"}],"answer":["A","C","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0706"},{"stem":"关于电力市场中价格形成机制的分析，以下说法正确的是（）","type":"多选","options":[{"label":"A","text":"在完全竞争市场中，电力价格由市场整体供需关系决定，厂商是价格接受者"},{"label":"B","text":"在垄断竞争和寡头垄断市场中，价格由市场供需情况和厂商策略共同决定"},{"label":"C","text":"在完全垄断市场中，垄断企业可以完全控制价格，可能会损害消费者利益和社会福利"},{"label":"D","text":"对于完全竞争市场，监管机构的主要职责是对价格进行严格干预"},{"label":"E","text":"在寡头垄断市场中，企业的定价决策完全独立，不受其他企业行为影响"}],"answer":["A","B","C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0707"},{"stem":"关于市场垄断程度的变化，以下说法正确的是（）","type":"多选","options":[{"label":"A","text":"市场的垄断程度可能随市场规模的变化而发生变化"},{"label":"B","text":"技术发展可能影响企业的最佳规模，从而影响市场的垄断程度"},{"label":"C","text":"当市场需求较小时，完全垄断可能是最优的市场结构"},{"label":"D","text":"分布式发电技术的发展可能会降低电力行业的垄断程度"},{"label":"E","text":"垄断市场中存在大量生产相似产品的小企业"}],"answer":["A","B","C","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0708"},{"stem":"以下哪一项是垄断竞争市场的特征（）","type":"多选","options":[{"label":"A","text":"存在许多卖者"},{"label":"B","text":"有差别的物品"},{"label":"C","text":"长期经济利润"},{"label":"D","text":"自由进入与退出"},{"label":"E","text":"企业是价格接受者。"}],"answer":["A","B","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0709"},{"stem":"关于企业财务会计报表及财务分析，以下说法正确的是（）","type":"多选","options":[{"label":"A","text":"资产负债表反映企业在某一特定日期的财务状况，包括资产、负债及所有者权益"},{"label":"B","text":"利润表用于反映企业的盈利能力和经营状况，通常以一个月为统计周期"},{"label":"C","text":"现金流量表主要分析企业的筹资活动、投资活动及经营活动所产生的现金流量"},{"label":"D","text":"企业的偿债能力比率仅包括短期偿债能力比率"},{"label":"E","text":"现金流量表与利润表均以权责发生制为基础"}],"answer":["A","C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0710"},{"stem":"关于企业利润，以下说法正确的是（）","type":"多选","options":[{"label":"A","text":"企业利润最大化的条件是边际收入等于边际成本"},{"label":"B","text":"短期利润计算时仅考虑可变成本，而长期利润考虑全部成本"},{"label":"C","text":"需求缺乏弹性的行业，涨价一般会减少企业的总收益"},{"label":"D","text":"长期利润通常比短期利润高，因为考虑了全部成本"},{"label":"E","text":"企业利润最大化时，其总收入达到最大"}],"answer":["A","B"],"levels":["高级工"],"scope":"高级工独有","id":"Q0711"},{"stem":"关于规模收益的说法，正确的有()","type":"多选","options":[{"label":"A","text":"规模收益是企业的生产规模与所引起的产量之间的关系"},{"label":"B","text":"规模收益可以分为两类"},{"label":"C","text":"规模收益研究的是长期生产决策问题"},{"label":"D","text":"技术进步决定生产规模"},{"label":"E","text":"规模收益递减与边际产量递减是同一现象"}],"answer":["A","C"],"levels":["高级工"],"scope":"高级工独有","id":"Q0712"},{"stem":"下列说法正确的是（）。","type":"多选","options":[{"label":"A","text":"供给的价格弹性是指价格变动的百分比除以供给量变动的百分比的商"},{"label":"B","text":"供给弹性也受很多因素的影响，其中最主要的因素之一是行业中增加生产的困难程度"},{"label":"C","text":"供给曲线并不是确定的，一些因素的变化会影响供给曲线，比如原材料价格的变化，生产效率的变化等"},{"label":"D","text":"供给弹性不是其变化量的关系，是没有量纲的，与供给量、价格的单位没有关系"},{"label":"E","text":"供给价格弹性的绝对值越大，表示供给量对价格变化越不敏感"}],"answer":["B","C","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0713"},{"stem":"下列关于需求价格弹性说法正确的有（）。","type":"多选","options":[{"label":"A","text":"商品的需求的严格定义是指消费者在一定时期内在一定价格水平下愿意并且能够购买的该商品的数量"},{"label":"B","text":"需求的价格弹性简称价格弹性，为价格变化的百分比与需求量变化的百分比之比"},{"label":"C","text":"大多数商品的价格弹性是正的"},{"label":"D","text":"需求曲线上某个点的价格弹性，不仅仅与该处曲线的斜率有关，还与该点的需求量、价格的数值有关"},{"label":"E","text":"需求价格弹性的绝对值越大，说明需求对价格变化越不敏感"}],"answer":["A","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0714"},{"stem":"下列属于垄断产生的主要原因的是（）。","type":"多选","options":[{"label":"A","text":"资源垄断"},{"label":"B","text":"行政性垄断"},{"label":"C","text":"市场规模"},{"label":"D","text":"自然垄断"},{"label":"E","text":"集中决策"}],"answer":["A","B","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0715"},{"stem":"在电力市场环境下，关于风力发电的描述正确的有?","type":"多选","options":[{"label":"A","text":"风力发电机组按照调度方式，可以分为统调和非统调机组"},{"label":"B","text":"按照补贴情况，可以分为带补贴项目和平价上网项目"},{"label":"C","text":"风力发电所有项目均可以参加绿证交易"},{"label":"D","text":"风力发电机组可以按照同一个法人、同一个并网点且同一个项目核准，以机组群方式参与市场交易申报。"},{"label":"E","text":"风力发电机组参加了绿电交易就不能参加现货出清。"}],"answer":["A","B","C","D"],"levels":["高级工"],"scope":"高级工独有","id":"Q0716"},{"stem":"在合规性审查中，以下（）是审查机构可能关注的重点。","type":"多选","options":[{"label":"A","text":"交易数据的准确性"},{"label":"B","text":"交易行为的透明度"},{"label":"C","text":"交易员个人的交易动机"},{"label":"D","text":"交易对手的信用状况"},{"label":"E","text":"交易平台的系统安全性"}],"answer":["A","B","D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0717"},{"stem":"以下（）行为可能导致交易员在合规性审查中受到处罚。","type":"多选","options":[{"label":"A","text":"未能提供完整的交易记录"},{"label":"B","text":"故意填报错误的交易数据"},{"label":"C","text":"未能在规定时间内完成数据填报"},{"label":"D","text":"未对交易数据进行必要的审核"},{"label":"E","text":"操作失误导致企业亏损"}],"answer":["A","B","C","D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0718"},{"stem":"在进行合规性审查时，以下（）文件是交易员需要准备的。","type":"多选","options":[{"label":"A","text":"交易合同副本"},{"label":"B","text":"交易数据填报记录"},{"label":"C","text":"交易对手方的身份证明"},{"label":"D","text":"交易员个人的财务报表"},{"label":"E","text":"交易平台的操作手册"}],"answer":["A","B"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0719"},{"stem":"电力交易机构负责市场交易相关的信息披露，主要包括（）等信息。","type":"多选","options":[{"label":"A","text":"交易规则"},{"label":"B","text":"交易实施细则"},{"label":"C","text":"交易信息"},{"label":"D","text":"交易出清结果"},{"label":"E","text":"交易结算结果"}],"answer":["A","B","C","D","E"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0720"},{"stem":"发电企业应当披露的公开信息包括（）。","type":"多选","options":[{"label":"A","text":"电厂机组信息"},{"label":"B","text":"机组出力受限情况"},{"label":"C","text":"机组检修计划"},{"label":"D","text":"机组设备改造计划"},{"label":"E","text":"电厂结算信息"}],"answer":["A","B","C","D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0721"},{"stem":"在分析市场趋势时，以下（）长期因素是电力交易员需要考虑的。","type":"多选","options":[{"label":"A","text":"可再生能源的发展"},{"label":"B","text":"电动汽车的普及"},{"label":"C","text":"能源存储技术的进步"},{"label":"D","text":"电网基础设施的升级"},{"label":"E","text":"短期市场波动"}],"answer":["A","B","C","D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0722"},{"stem":"交易中心有（）权责。","type":"多选","options":[{"label":"A","text":"负责拟定电力市场结算实施细则及管理制度"},{"label":"B","text":"负责出具电力市场结算依据"},{"label":"C","text":"披露电力市场年度、月度、日结算电量电费等信息"},{"label":"D","text":"建设和运维交易系统，负责结算功能开发、算法维护等工作"},{"label":"E","text":"协调处理市场主体间的结算争议"}],"answer":["A","B","C","D","E"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0723"},{"stem":"市场竞争所需信息应当充分披露，信息披露主体对其提供信息的（）负责。","type":"多选","options":[{"label":"A","text":"真实性"},{"label":"B","text":"准确性"},{"label":"C","text":"完整性"},{"label":"D","text":"规范性"},{"label":"E","text":"及时性"}],"answer":["A","B","C","E"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0724"},{"stem":"企业的盈利能力包括净利率、（）等指标。","type":"多选","options":[{"label":"A","text":"毛利率"},{"label":"B","text":"营业利润率"},{"label":"C","text":"净资产收益率"},{"label":"D","text":"现金比率"},{"label":"E","text":"资产回报率"}],"answer":["A","B","C","E"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0725"},{"stem":"市场运营机构应当向特定市场主体披露其私有信息包括（）。","type":"多选","options":[{"label":"A","text":"结算电价"},{"label":"B","text":"电费结算依据"},{"label":"C","text":"中长期结算曲线"},{"label":"D","text":"实时节点边际电价"},{"label":"E","text":"市场运营机构的内部财务报表"}],"answer":["A","B","C","D"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0726"},{"stem":"中长期交易结算中，合同偏差电量的处理方式包括以下（）。","type":"多选","options":[{"label":"A","text":"预挂牌月平衡偏差方式"},{"label":"B","text":"等比例调整方式"},{"label":"C","text":"滚动调整方式"},{"label":"D","text":"实时调整方式"},{"label":"E","text":"年度调整方式"}],"answer":["A","B","C"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0727"},{"stem":"在现货模式下，用户侧电能量电费支出包括以下（）内容。","type":"多选","options":[{"label":"A","text":"中长期合约电能量电费"},{"label":"B","text":"日前市场偏差电能量电费"},{"label":"C","text":"实时市场偏差电能量电费"},{"label":"D","text":"分摊电费"},{"label":"E","text":"返还电费"}],"answer":["A","B","C","D","E"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0728"},{"stem":"交易结果分析通常包括以下（）方面。","type":"多选","options":[{"label":"A","text":"交易量分析"},{"label":"B","text":"价格走势分析"},{"label":"C","text":"市场主体行为分析"},{"label":"D","text":"市场供需平衡分析"},{"label":"E","text":"风险评估"}],"answer":["A","B","C","D","E"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0729"},{"stem":"零售用户用能预测方法分为两种，分别为（）。","type":"多选","options":[{"label":"A","text":"传统预测法"},{"label":"B","text":"智能预测法"},{"label":"C","text":"时间序列法"},{"label":"D","text":"回归分析法"},{"label":"E","text":"模糊负荷法"}],"answer":["A","B"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0730"},{"stem":"关于电力中长期交易结果的发布与异议处理，以下说法正确的是：","type":"多选","options":[{"label":"A","text":"电力交易机构负责发布交易结果"},{"label":"B","text":"市场主体 ","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q0946"},{"stem":"在供需平衡点，需求量与供给量相等，市场达到了均衡。在这一点价格既没有上升，也没有下降的趋势，这一点的价格被称为市场出清价格或市场清除价，意味着所有供给和需求定单都已完成，所有需求者和供给者都得到了满足","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q0947"},{"stem":"根据需求法则，需求是一条向上的曲线；而根据供给法则，供给是一条向下的曲线。一条向上，一条向下，画到一个坐标系中，就会相交，这就是供需平衡。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q0948"},{"stem":"我国省间电力现货市场的雏形是跨区域省间富余可再生能源电力现货交易市场。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q0949"},{"stem":"发电设备的调频可以理解成发电设备的无功出力增减。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q0950"},{"stem":"根据需求理论，一种商品的价格增加，其需求量减少。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q0951"},{"stem":"工商业用户的电费中，功率因数调整系数取决于用户的无功功率大小，居民和农业用户不对功率因数进行考核。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q0952"},{"stem":"我国的电网频率50HZ，折合到常规发电机组每分钟是3000转的转速。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q0953"},{"stem":"在电力系统中，35KV及以下的配电网络采取中性点不接地的运行方式。当发生单相接地故障时，允许非故障相的电压短时升高到线电压水平继续运行。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q0954"},{"stem":"电力系统的输电网络中，电压等级通常分为高压、超高压和特高压。在中国，330kV和500kV的输电线路属于高压输电线路。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q0955"},{"stem":"民法典中的供用电合同内容和零售侧售电合同内容基本一致。","type":"判断","options":[{"label":"对","text":"对"},{"l Q0966"},{"stem":"为了提高交易效率，交易平台可以自动同步外部系统中的主体数据，无需人工干预。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0967"},{"stem":"交易平台主体数据设置时，不需要考虑主体之间的关联关系，如控股关系或集团内部交易等。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0968"},{"stem":"在电力交易平台上，主体数据的变更必须通过书面申请并经过审核后，才能由系统管理员在系统中进行更新。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0969"},{"stem":"主体数据设置中，系统管理员可以为不同类型的交易主体设置不同的交易权限和额度限制，以适应不同的交易需求。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0970"},{"stem":"售电公司完成售电资质公示并通过后，才能签订相关的购售电合同。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0971"},{"stem":"售电公司强制退出条件启动后，无需向社会公示。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0972"},{"stem":"交易平台在设置主体数据时，可以允许同一主体使用多个账户进行交易，以提高交易灵活性。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0973"},{"stem":"交易平台主体数据设置时，必须将所有参与交易的电力用户和发电企业的详细信息纳入系统，包括但不限于资质证书、联系方式等。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0974"},{"stem":"电力交易报价数据的合规性审查中包括数据来源的可靠性。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0975"},{"stem":"电力交易报价数据的规则限制中，地域限制是指某些地区可能禁止或限制某些类型的电力交易。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0976"},{"stem":"电力交易报价数据的规则限制中，数量限制是为了避免市场垄断。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0977"},{"stem":"电力交易报价数据的规则限制中，时间限制是指报价必须在交易日当天或之前提交。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0978"},{"stem":"电力交易报价数据的规则限制中，价格限制是为了防止过度投机，确保公平竞争。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0979"},{"stem":"电力交易报价数据的合规性审查中，数据是否符合要求主要指系统要求确认到小数点后两位。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0980"},{"stem":"电力交易报价数据的合规性审查中，价格是否符合要求主要避免价格过低过高不符合相关事实。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0981"},{"stem":"电力交易报价数据的单位只能是兆瓦时（MWh），不能使用千瓦时（kWh）。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0982"},{"stem":"售电企业申报交易数据中，代理购电合约和代理用电数据是必须提供的信息。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0983"},{"stem":"发电企业在申报交易数据时，只需提供交易电量和交易价格，无需提供成交电量和成交电价。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0984"},{"stem":"电力交易报价数据错误的纠正中，当用户申报量、申报价格不符合平台限制条件时，系统会自动修改。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0985"},{"stem":"电力交易报价数据中，申报表还应包括申报年月、交易序列标识、申报人等数据内容。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0986"},{"stem":"售电企业申报交易数据中包括代理用电数据，指的是售电公司代理零售用户的负荷。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0987"},{"stem":"电力交易报价数据的合规性审查中，数据是否符合要求主要指数据来源可靠。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0988"},{"stem":"电力交易报价数据的合规性审查中，价格是否符合要求主要避免价格波动。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0989"},{"stem":"电力交易报价数据的规则限制中包括价格限制、时间限制和数量限制。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0990"},{"stem":"电力交易报价数据规格中包括数据来源、数据格式、数据质量和数据指标。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0991"},{"stem":"发电企业申报交易数据中包括代理购电合约。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0992"},{"stem":"在电力交易报价数据中，如果某条记录的时间戳格式不统一（如部分为“YYYY-MM-DD”，部分为“YYYY/MM/DD”），这属于数据规范性问题。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0993"},{"stem":"在电力交易报价数据中，如果某条记录的报价时间戳缺失，但报价数值和交易时段完整，该数据仍可视为规范且完整的数据。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0994"},{"stem":"在电力市场中，市场经营主体的信用占用度越高，说明其在市场中的交易活跃度一定越高。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0995"},{"stem":"当市场经营主体信用占用度达到最高级别时，市场管理机构才能对市场经营主体进行信用额度预警或通。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0996"},{"stem":"电力交易机构可根据市场运行实际，对初始信用额度及其调增要求提出调整并且实施。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0997"},{"stem":"市场经营主体的无担保信用额度等于市场经营主体的无形净资产（TNW）×无形净资产比例（TNW%）","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0998"},{"stem":"市场经营主体获得担保信用额度的方式为，向信用管理机构提交相应金额的担保品。可用于获取担保信用额度的担保品类型由信用管理机构确定。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q0999"},{"stem":"信用额度帮助市场管理机构控制结算风险，确保市场参与者能够履行其交易义务。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1000"},{"stem":"在电力市场电价风险管理台账的更新中，依赖自动化数据采集系统即可确保台账数据的全面性和准确性。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1001"},{"stem":"外部和内部电价风险的风险影响度同样很高，同时它们都可以在短期判断其风险影响度大小。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1002"},{"stem":"电价的剧烈波动可能导致市场参与者的不确定性增加，并且对所有电力用户都会产生较大的影响。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1003"},{"stem":"对于风险因素等级的判别方法，行业内有一套标准的判断标准。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1004"},{"stem":"电力市场交易策略按照交易时间分类可分为长期和短期交易策略。除此之外还可以按照交易品种、市场类型区分。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1005"},{"stem":"随着电力体制改革的进行，我国所有电厂的上网电价都由市场交易进行确定","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1006"},{"stem":"风险管理策略应包括风险识别、风险量化、风险控制和风险监测，定期的风险评估和审计有助于及时发现潜在问题并采取相应措施。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1007"},{"stem":"对严重违法失信的市场经营主体可按照有关部门要求取消市场交易资格，强制退出电力市场","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1008"},{"stem":"分散投资能消除非系统性风险，实现同等收益下的风险最小化或同等风险下的收益最大化。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1009"},{"stem":"核对结算单的整体结算情况时，可以不核对结算单中的总结算电量、结算电费、售电公司收益是否与自身用电情况相符。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1010"},{"stem":"调峰服务费用应由火电（燃煤、燃气）、风电、光伏（扶贫光伏场站除外）等发电企业及参与市场化交易的用户共同承担。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1011"},{"stem":"电力辅助服务是指为维持电力系统安全稳定运行，保证电能质量，促进清洁能源消纳，除正常电能生产、输送、使用外，由火电、水电、核电、风电、光伏发电、光热发电、抽水蓄能、自备电厂等发电侧并网主体，电化学、压缩空气、飞轮等新型储能，传统高载能工业负荷、工商业可中断负荷、电动汽车充电网络等能够响应电力调度指令的可调节负荷(含通过聚合商、虚拟电厂等形式聚合)提供的服务。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1012"},{"stem":"电容量电价机制适用于合规在运的公用煤电机组、燃煤自备电厂、不符合国家规划的煤电机组，以及不满足国家对于能耗、环保和灵活调节能力等要求的煤电机组。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1013"},{"stem":"未运行日前市场、仅运行实时市场的省内现货市场（结算方式二）用户侧结算，根据市场构成不同，中长期结算参考点的现货价格不可以由日前市场出清价格或者实时市场出清价格确定。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1014"},{"stem":"未运行日前市场、仅运行实时市场的省内现货市场（结算方式一）用户侧结算，中长期差价合约电费＝Σ[合约电量×（合约价格－中长期结算参考点现货电价）]。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1015"},{"stem":"运行日前市场的省内现货市场（结算方式二），根据市场构成不同，中长期结算参考点的现货价格可以由日前市场出清价格或者实时市场出清价格确定。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1016"},{"stem":"非现货市场零售用户耦合结算 bel":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1056"},{"stem":"对于独立储能市场主体，电力调度机构在下一次深调充电调用前，视电网运行情况安排放电。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1057"},{"stem":"发电企业不仅需要深入理解省内、省间电力现货市场各自的运作机制，还要了解两者的衔接机制，精准把握市场动态，同时也要充分考虑到自身的生产能力、成本结构和市场需求等因素。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1058"},{"stem":"日内阶段,国调中心、网调组织开展省间现货交易;网调组织开展区域内省间辅助服务交易,并开展区域内滚动校核。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1059"},{"stem":"日前阶段,国调中心、网调在D-2日下发基于中长期交易计划的跨省跨区通道输电计划及直调机组预计划,作为省内预出清或预平衡的边界,实现中长期与现货的时序衔接,省调根据接收的联络线预计划进行省内预出清或预平衡,确定省间交易需求。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1060"},{"stem":"省间电力现货交易的目的是在落实省间国家计划和中长期交易基础上,充分发挥市场作用,对富余电能资源进行大范围优化配置,但是不能促进绿色清洁发电和省间电能余缺互济。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1061"},{"stem":"通过省间电力现货交易,以市场化手段引导电能从平衡富余地区流向平衡紧张地区,激励发电企业在满足省内发电计划基础上主动顶峰发电,提升全网电力供应能力。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1062"},{"stem":"推算省内预出清价格之后，综合考虑市场的供需状况、市场参与者的行为以及市场的外部环境因素，了解省内、省间电力供需关系，为发电侧是否参与省间现货市场或省内实时现货市场提供参考依据。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1063"},{"stem":"可以利用历史数据、天气信息、用户用电特性等多重因素，采用先进的预测技术提高预测精度。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工","技师"],"scope":"高级工+技师","id":"Q1064"},{"stem":"现货市场价格波动与对应区域供需关系、主体报价策略调整及线路阻塞等因素相关。","type":"判断","options":[{"label":"对","text":"对 :[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q1275"},{"stem":"双边交易申报中，申报方在首次进入交易序列的申报页面时，需要确认交易承诺书。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q1276"},{"stem":"发电企业在电力交易平台进行交易公告查看时，只能查看本企业参与的交易序列。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q1277"},{"stem":"市场经营主体披露信息的规则以各地方的电力交易中心制定为主。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q1278"},{"stem":"对于发、售电企业，主要审查其发电设施的技术参数、环保标准、运行维护能力等。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q1279"},{"stem":"市场力相关风险指的是在电力市场中，某些市场经营主体因其规模、资源控制或信息优势而拥有影响市场价格和交易条件的能力。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q1280"},{"stem":"等报价串谋具有报价相似、报价改变同步和易高价中标等特点。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q1281"},{"stem":"为了应对燃料成本带来的电价风险，发电企业通常会采取多种策略，如多元化燃料来源、签订长期燃料供应合同、使用金融衍生品进行风险对冲等。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["高级工"],"scope":"高级工独有","id":"Q1282"},{"stem":"电力交易机构认定市场经营主体不良（负面）行为情节严重、对市场造成较大不良影响的，可对实施不良行为的市场经营主体采取书面警示。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q1283"},{"stem":"信用评级是电力市场信用风险管理的核心工具，它通过量化的方式评估市场经营主体的信用状况。并且信用评级业务是每个交易中心独立开展，不存在第三方开展的情况。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q1284"},{"stem":"全社会、全行业、产业链全流程的信用数据不流通也可以对信用风险进行预警和评估。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["高级工"],"scope":"高级工独有","id":"Q1285"},{"stem":"在中国，随着新能源的快速发展，电力调度运行机制主要因为（）而需要优化调整。","type":"单选","options":[{"label":"A","text":"新能源发电设备需要更新换代"},{"label":"B","text":"新能源发电具有波动性和不确定性，要保障系统稳定性"},{"label":"C","text":"传统能源逐渐被淘汰，需要改变调度策略"},{"label":"D","text":"为了加快新能源的发展速度"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1286"},{"stem":"按照《关于建立煤电容量电价机制的通知》规定，各地煤电容量电费纳入系统运行费用，每月由（）按当月用电量比例分摊。","type":"单选","options":[{"label":"A","text":"全部用户"},{"label":"B","text":"工商业用户"},{"label":"C","text":"居民用户"},{"label":"D","text":"农业用户"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1287"},{"stem":"2021年1439号文《关于进一步深化燃煤发电上网电价市场化改革的通知》印发背景不包括（）。","type":"单选","options":[{"label":"A","text":"煤价电价不联动"},{"label":"B","text":"部分地区供电紧张"},{"label":"C","text":"交易机构独立运营"},{"label":"D","text":"电力市场建设"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1288"},{"stem":"2023年7月，国家发展改革委发布《关于第三监管周期省级电网输配电价及有关事项的通知》，核定（）省级电网输配电价。","type":"单选","options":[{"label":"A","text":"2023—2024年"},{"label":"B","text":"2023—2025年"},{"label":"C","text":"2023—2026年"},{"label":"D","text":"2023—2027年"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1289"},{"stem":"2021年印发的《售电公司管理办法》主要内容不包括（）。","type":"单选","options":[{"label":"A","text":"售电公司的注册条件"},{"label":"B","text":"售电公司的运营和退出原则"},{"label":"C","text":"售电公司的收益上限"},{"label":"D","text":"监管机构对售电公司市场行为的监管和行政执法工作"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1290"},{"stem":"《民法典》第六百四十八条明确了供用电合同是（）向用电人供电，用电人支付电费的合同。","type":"单选","options":[{"label":"A","text":"电网企业。"},{"label":"B","text":"‌售电公司。"},{"label":"C","text":"‌供电人。"},{"label":"D","text":"‌配电公司。"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1291"},{"stem":"在变电站的一次系统中，（）不属于母线设备。","type":"单选","options":[{"label":"A","text":"母线"},{"label":"B","text":"母线隔离开关"},{"label":"C","text":"母线电压互感器"},{"label":"D","text":"断路器"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1292"},{"stem":"在电力系统中，二次系统主要负责监控、控制和保护，并与一次系统进行通信。以下（）功能不由二次系统直接负责。","type":"单选","options":[{"label":"A","text":"实时测量电力设备的工作状态"},{"label":"B","text":"远程控制断路器的开合"},{"label":"C","text":"维持发电机的最佳运行状态"},{"label":"D","text":"记录电力系统的故障信息"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1293"},{"stem":"电力系统运行具有（）得特点。","type":"单选","options":[{"label":"A","text":"可随意调整供需平衡"},{"label":"B","text":"高度实时性"},{"label":"C","text":"可独立运行各个部分"},{"label":"D","text":"不需要进行任何监测"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1294"},{"stem":"我国电网（）电压等级不再广泛使用。","type":"单选","options":[{"label":"A","text":"6kV"},{"label":"B","text":"10kV"},{"label":"C","text":"110kV"},{"label":"D","text":"220kV"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1295"},{"stem":"在某电力系统中，为了确保稳定和高效的运行，电力调度中心需要精确计算各种负荷。假设在某一特定时刻，系统的用电负荷为800MW，线路损耗为50MW，发电厂的厂用电负荷为30MW。据此可计算，供电负荷为（），发电负荷（）。","type":"单选","options":[{"label":"A","text":"850MW，880MW。"},{"label":"B","text":"830MW，860MW。"},{"label":"C","text":"850MW，860MW。"},{"label":"D","text":"830MW，880MW。"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1296"},{"stem":"以下关于变压器的功率损耗和电压降落不正确的是（）。","type":"单选","options":[{"label":"A","text":"功率损耗包含阻抗支路和励磁支路的功率损耗；"},{"label":"B","text":"励磁支路的无功功率与线路对地支路的无功功率符号相同；"},{"label":"C","text":"功率损耗可由变压器铭牌的试验数据进行计算；"},{"label":"D","text":"通常，对变电所的变压器往往已知负荷侧的功率。"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1297"},{"stem":"劳动的边际产量和产量的边际成本的关系是（）","type":"单选","options":[{"label":"A","text":"边际成本是边际产量的倒数"},{"label":"B","text":"边际成本等于工资除以边际产量"},{"label":"C","text":"当边际产量向下倾斜时，边际成本向下倾斜"},{"label":"D","text":"边际成本保持不变，但边际产量遵循收益递减原则"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1298"},{"stem":"电力市场运行基本规则（国家发展改革委2024年第20号令）的施行时间是（）。","type":"单选","options":[{"label":"A","text":"2024年7月1日。"},{"label":"B","text":"2024年9月1日。"},{"label":"C","text":"2025年1月1日。"},{"label":"D","text":"2025年4月1日。"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1299"},{"stem":"在电力传输过程中，为了减少电能损耗，（）是最有效的方法。","type":"单选","options":[{"label":"A","text":"增大输电线路的电阻"},{"label":"B","text":"提高输电电压"},{"label":"C","text":"减小输电频率"},{"label":"D","text":"增加变压次数"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1300"},{"stem":"以下关于节点导纳矩阵的形成不正确的是（）。","type":"单选","options":[{"label":"A","text":"对于多电压级网络需要做参数统一归算从而形成节点导纳矩阵；"},{"label":"B","text":"导纳矩阵修改需要考虑变压器的电压比变化；"},{"label":"C","text":"引入“理想变压器”的作用是刻画电压比变化时导纳矩阵的全局元素变化；"},{"label":"D","text":"所谓理想变压器是指以理想铁磁材料制作的具有理想磁化特性的变压器。"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1301"},{"stem":"电力系统静态安全性是指电力系统在正常运行状态以及遭遇非极端扰动时，能否保持其（）以外的电气量在技术规范或安全限制内。","type":"单选","options":[{"label":"A","text":"电压；"},{"label":"B","text":"频率；"},{"label":"C","text":"功率流；"},{"label":"D","text":"电流"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1302"},{"stem":"以下对周期失步描述错误的是（）：","type":"单选","options":[{"label":"A","text":"系统受扰后形成周期性振荡；"},{"label":"B","text":"振荡的幅值随时间越来越大；"},{"label":"C","text":"也称为自发振荡；"},{"label":"D","text":"也称为滑行失步"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1303"},{"stem":"关于静态安全问题的分类正确的是（）","type":"单选","options":[{"label":"A","text":"将电力系统稳定分为功角稳定、频率稳定和电压稳定；"},{"label":"B","text":"根据IEEE/CIGRE，功角稳定被认为是长期过程；"},{"label":"C","text":"根据航标DL755-2001，电压稳定仅包含短期过程；"},{"label":"D","text":"根据IEEE/CIGRE和航标DL755-2001，频率稳定仅包含长期过程"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1304"},{"stem":"以下（）不是电力调度控制系统分层级划分的划分方式。","type":"单选","options":[{"label":"A","text":"按照控制水平划分"},{"label":"B","text":"按照模型化方法的不同划分"},{"label":"C","text":"按照组织分层进行划分"},{"label":"D","text":"按照地理区域划分"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1305"},{"stem":"电价波动率序列即电价序列的算术收益率序列它是指电价相对____的电价收益率。","type":"单选","options":[{"label":"A","text":"前一时间点"},{"label":"B","text":"前一个小时"},{"label":"C","text":"前一次交易价格"},{"label":"D","text":"前一段时间的平均电价"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1306"},{"stem":"省间电力现货交易是全国统一电力市场的重要组成部分需要从（）、市场边界和偏差处理等方面，设计省间现货交易与省间中长期交易、省间现货交易与省内现货交易的衔接机制。","type":"单选","options":[{"label":"A","text":"交易公告"},{"label":"B","text":"交易规则"},{"label":"C","text":"交易时序"},{"label":"D","text":"市场边界"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1307"},{"stem":"在偏差处理方面实际运行与合同约定产生的偏差根据（）分别按照省间、省内市场规则处理。","type":"单选","options":[{"label":"A","text":"偏差大小"},{"label":"B","text":"成因和影响范围"},{"label":"C","text":"交易时序"},{"label":"D","text":"影响大小"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1308"},{"stem":"（）是指根据市场主体的日前市场申报数据，以机组初始状态、负荷预测、联络线计划等作为市场边界，考虑电网安全约束、机组运行约束、系统约束及其他可行性约束条件，每天分为若干个交易时段(如24或96个时段)按照市场规则以社会福利最大化(或购电费用最小、发电成本最小)等为目标函数基于安全约束机组组合(SCUC)和安全约束经济调度(SCED)集中优化出清次日机组组合、发电计划，并形成市场出清电价。","type":"单选","options":[{"label":"A","text":"日前市场"},{"label":"B","text":"日内市场"},{"label":"C","text":"实时市场"},{"label":"D","text":"以上都是"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1309"},{"stem":"考虑到多数市场主体以年为周期的财务报告制度，并且在当前电力市场开展的大环境下，（）作为压舱石的存在。","type":"单选","options":[{"label":"A","text":"年度交易"},{"label":"B","text":"月度交易"},{"label":"C","text":"多日交易"},{"label":"D","text":"偏差电量交易"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1310"},{"stem":"对于发电企业，在满足中长期合约各种约束限制的基础上，尽可能（）中长期合约价格与现货市场价格的价差。","type":"单选","options":[{"label":"A","text":"做大"},{"label":"B","text":"做小"},{"label":"C","text":"使相等"},{"label":"D","text":"使不等"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1311"},{"stem":"随着交易标的日的临近，交易信息和价格预测的准确率逐步（），交易曲线的确定相对灵活，因此月内、旬、周、D-3等短期交易的交易策略是，通过对不同时段预测信息准确率的情况来确定交易策略。","type":"单选","options":[{"label":"A","text":"提升"},{"label":"B","text":"降低"},{"label":"C","text":"不变"},{"label":"D","text":"不确定"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1312"},{"stem":"根据中长期合约收益的计算公式，合约收益是否盈利的关键在于（）。","type":"单选","options":[{"label":"A","text":"中长期合约价格"},{"label":"B","text":"中长期合约电量"},{"label":"C","text":"中长期合约价格与现货市场价格的价差"},{"label":"D","text":"现货市场价格"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1313"},{"stem":"碳市场与电力市场通过市场机制深刻影响发电企业等市场主体的行为决策，通过（）产生联动，借由发电量、装机容量、碳配额等中间变量实现市场状态交互传导。","type":"单选","options":[{"label":"A","text":"电价，碳价"},{"label":"B","text":"电价，煤价"},{"label":"C","text":"电价，绿证价格"},{"label":"D","text":"电价，绿电价格"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1314"},{"stem":"煤电机组有富余的碳排放权，其交易策略主要有考虑两方面：购入合同电量，或出售碳排放权。当购入合同电量的边际收益（）出售碳排放权的边际收益，煤电机组应购入额外的合同电量。","type":"单选","options":[{"label":"A","text":"大于"},{"label":"B","text":"小于"},{"label":"C","text":"等于"},{"label":"D","text":"不等于"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1315"},{"stem":"煤电机组在已有碳配额的情况下，无法完成合同电量，其交易策略主要有（）。","type":"单选","options":[{"label":"A","text":"购入合同电量或出售碳排放权"},{"label":"B","text":"购入合同电量或购入碳排放权"},{"label":"C","text":"出售合同电量或出售碳排放权"},{"label":"D","text":"出售合同电量或购入碳排放权*"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1316"},{"stem":"燃煤等传统化石能源在供应电能同时产生碳配额购买需求，发电量越多，碳配额需求越（）；随着碳配额需求增加，碳市场中的供需关系趋紧，碳价随之（）。","type":"单选","options":[{"label":"A","text":"大，降低"},{"label":"B","text":"大，升高"},{"label":"C","text":"小，降低"},{"label":"D","text":"小，升高"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1317"},{"stem":"以下（）不是电能量与辅助服务联合出清和独自出清的差异。","type":"单选","options":[{"label":"A","text":"出清定价原理"},{"label":"B","text":"对市场资源配置效率的影响"},{"label":"C","text":"技术实现难度、市场运营复杂程度、监管难度"},{"label":"D","text":"参与主体"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1318"},{"stem":"引入碳市场后，在配额以外的部分，由于燃煤机组发电成本（）燃气机组，因此在相同需求的情况下，电能量市场的出清顺序或将被改变。","type":"单选","options":[{"label":"A","text":"大于"},{"label":"B","text":"小于"},{"label":"C","text":"等于"},{"label":"D","text":"不确定"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1319"},{"stem":"发电机组提供有功功率辅助服务和电能量都占用发电机组容量，因此互为（）。","type":"单选","options":[{"label":"A","text":"边际成本"},{"label":"B","text":"变动成本"},{"label":"C","text":"机会成本"},{"label":"D","text":"沉没成本"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1320"},{"stem":"碳市场下煤电机组的发电空间=（）/平均排放因子。","type":"单选","options":[{"label":"A","text":"碳减排量"},{"label":"B","text":"初始碳配额"},{"label":"C","text":"变动成本"},{"label":"D","text":"边际成本"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1321"},{"stem":"关于省间市场与省内市场现货交易时序衔接描述正确的是（）","type":"单选","options":[{"label":"A","text":"省内预安排后组织省间交易，再以省间交易为边界开展省内交易"},{"label":"B","text":"省间预安排后组织省内交易，再以省内交易为边界开展省间交易"},{"label":"C","text":"省内交易和省间交易同步开展"},{"label":"D","text":"省内交易后再开展省间交易。"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1322"},{"stem":"省间电力现货交易结算采用（）方式。","type":"单选","options":[{"label":"A","text":"日清日结"},{"label":"B","text":"日清月结"},{"label":"C","text":"月清月结"},{"label":"D","text":"月清季结"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1323"},{"stem":"省间电力现货交易出清后，国调中心统筹组织网调、省调开展安全校核。安全校核未通过时，按照灵敏度（）顺序，取消相关省间电力现货交易，消除设备越限，（）。","type":"单选","options":[{"label":"A","text":"由低到高，出清边际电价不变"},{"label":"B","text":"由高到低，出清边际电价不变"},{"label":"C","text":"由低到高，重新计算出清边际电价"},{"label":"D","text":"由高到低，重新计算出清边际电价"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1324"},{"stem":"省内现货市场运行时，省内发电企业实际发电出力低于省间电力现货交易电力时，省间电力现货交易电力不变，少发电能按照（）向省内其他发电企业购买。","type":"单选","options":[{"label":"A","text":"省内中长期交易平均价格"},{"label":"B","text":"省内燃煤上网标杆电价上浮20%"},{"label":"C","text":"省内燃煤上网标杆电价的1.5倍"},{"label":"D","text":"省内现货市场价格"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1325"},{"stem":"根据《省间电力现货交易规则》，折算到卖方节点的买方市场主体电力=（）","type":"单选","options":[{"label":"A","text":"买方市场主体申报电力/线路网损率"},{"label":"B","text":"买方市场主体申报电力/（1+线路网损率）"},{"label":"C","text":"买方市场主体申报电力/（1-线路网损率）"},{"label":"D","text":"买方市场主体申报电力"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1326"},{"stem":"省间电力现货交易集中竞价中，（）市场主体在所在节点申报分时“电力-价格”曲线，考虑所有交易路径的输电价格和输电网损后，逐一折算到（）节点。","type":"单选","options":[{"label":"A","text":"卖方；买方"},{"label":"B","text":"买方；卖方"},{"label":"C","text":"卖方；平衡"},{"label":"D","text":"买方；平衡"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1327"},{"stem":"省间电力现货交易中将买方市场主体按照以下（）公式折算到卖方节点。","type":"单选","options":[{"label":"A","text":"折算到卖方节点的买方市场主体价格=买方市场主体报价-输电价格（含输电网损折价）"},{"label":"B","text":"折算到卖方节点的买方市场主体价格=买方市场主体报价+输电价格（含输电网损折价）"},{"label":"C","text":"折算到卖方节点的买方市场主体价格=买方市场主体报价+输电价格（不含输电网损折价）"},{"label":"D","text":"折算到卖方节点的买方市场主体价格=买方市场主体报价-输电价格（不含输电网损折价）"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1328"},{"stem":"省间电力现货交易中，火电和核电发电企业申报电力不得超过()。","type":"单选","options":[{"label":"A","text":"机组实际发电能力"},{"label":"B","text":"机组额定容量"},{"label":"C","text":"机组实际发电能力与预出清（预计划）之差"},{"label":"D","text":"机组额定容量与预出清（预计划）之差"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1329"},{"stem":"（）是指在系统高峰时段由直接负荷控制执行机构通过远端控制装置关闭或者循环控制用户的用电设备。","type":"单选","options":[{"label":"A","text":"直接负荷控制"},{"label":"B","text":"可中断负荷"},{"label":"C","text":"需求侧竞价"},{"label":"D","text":"紧急需求响应"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1330"},{"stem":"（）是根据供需双方事先的合同约定，在电网高峰时段由负荷聚合商、虚拟电厂等发出中断请求信号，经电力用户响应后中断部分供电的一种方法。","type":"单选","options":[{"label":"A","text":"直接负荷控制"},{"label":"B","text":"可中断负荷"},{"label":"C","text":"需求侧竞价"},{"label":"D","text":"紧急需求响应"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1331"},{"stem":"（）是需求侧资源参与电力市场竞争的一种实施机制，能够通过改变自己的用电方式，以竞价的形式主动参与市场竞争并获得相应的经济利益，不再是现货市场中单纯是价格的接受者。","type":"单选","options":[{"label":"A","text":"直接负荷控制"},{"label":"B","text":"可中断负荷"},{"label":"C","text":"需求侧竞价"},{"label":"D","text":"紧急需求响应"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1332"},{"stem":"（）是当电力系统面临巨大压力时提供低成本的容量资源来帮助预防电力中断。","type":"单选","options":[{"label":"A","text":"直接负荷控制"},{"label":"B","text":"可中断负荷"},{"label":"C","text":"需求侧竞价"},{"label":"D","text":"紧急需求响应"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1333"},{"stem":"（）是一种可以有效反映电力系统不同时段供电成本差别的电价机制。","type":"单选","options":[{"label":"A","text":"分时电价"},{"label":"B","text":"实时电价"},{"label":"C","text":"尖峰电价"},{"label":"D","text":"丰枯电价"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1334"},{"stem":"（）是一种动态定价机制，其时间周期为1小时或者更短，将零售价格与批发价格联动，精确反映每天各时段供电成本的变化并有效传达电价信号。","type":"单选","options":[{"label":"A","text":"分时电价"},{"label":"B","text":"实时电价"},{"label":"C","text":"尖峰电价"},{"label":"D","text":"丰枯电价"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1335"},{"stem":"（）是在分时电价和实时电价的基础上发展起来的一种动态电价机制，即通过在分时电价上叠加尖峰时段价格而形成。","type":"单选","options":[{"label":"A","text":"分时电价"},{"label":"B","text":"实时电价"},{"label":"C","text":"尖峰电价"},{"label":"D","text":"丰枯电价"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1336"},{"stem":"（）是一种反映不同季节供电成本差别的电价机制，将丰水季节电价适当调低，枯水季节电价适当调高。","type":"单选","options":[{"label":"A","text":"分时电价"},{"label":"B","text":"实时电价"},{"label":"C","text":"尖峰电价"},{"label":"D","text":"丰枯电价"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1337"},{"stem":"（）是指电价的相对变动引起的电能需求量的相对变动，即在一定的时间段内，用电量变化的百分率与相应的价格变化的百分率之比。","type":"单选","options":[{"label":"A","text":"潮流灵敏度"},{"label":"B","text":"电力需求弹性系数"},{"label":"C","text":"可调节容量"},{"label":"D","text":"需求响应"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1338"},{"stem":"在电力市场批发竞争模式中，电能批发价格是由（）相互作用的结果。","type":"单选","options":[{"label":"A","text":"发电与输电"},{"label":"B","text":"电力供应与需求"},{"label":"C","text":"电能投标和报价"},{"label":"D","text":"发电成本与销售价格"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1339"},{"stem":"2023年7月某交易日，售电公司B卖出7月第3周的电量5万度，买入8月第1周的电量15万度,则该日内发生的2023年8月月度净合约量为（）万度。","type":"单选","options":[{"label":"A","text":"15"},{"label":"B","text":"-5"},{"label":"C","text":"5"},{"label":"D","text":"-15"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1340"},{"stem":"开展电力中长期分时段交易的作用不包括（）。","type":"单选","options":[{"label":"A","text":"减小交易难度"},{"label":"B","text":"体现电能量时段价值，引导削峰填谷"},{"label":"C","text":"更好适应新能源运行特性"},{"label":"D","text":"更有利于与现货市场机制衔接"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1341"},{"stem":"原则上，中长期模式下，保底售电价格按电网代理购电价格的（）倍执行；有现货市场的地区，原则上保底售电价格应不低于现货均价的（）倍。具体价格水平由省级价格主管部门确定。","type":"单选","options":[{"label":"A","text":"1.2，1.5"},{"label":"B","text":"1.2，2"},{"label":"C","text":"1.5，1.5"},{"label":"D","text":"1.5，2"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1342"},{"stem":"根据《电力中长期交易基本规则》系统月度实际用电需求与月度发电计划存在偏差时,可采用的偏差处理机制不包括（）。","type":"单选","options":[{"label":"A","text":"发电侧上下调预挂牌机制"},{"label":"B","text":"偏差电量次月挂牌"},{"label":"C","text":"月内交易"},{"label":"D","text":"合同电量滚动调整"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1343"}, 技师"],"scope":"技师新增","id":"Q1450"},{"stem":"高耗能企业收入成本对电价的敏感性主要体现在以下（）方面。","type":"单选","options":[{"label":"A","text":"电价的微小变化对高耗能企业的生产规模影响不大，但会显著影响其利润水平。"},{"label":"B","text":"电价的微小变化对高耗能企业的生产规模和利润水平影响均不明显。"},{"label":"C","text":"电价的微小变化对高耗能企业的生产规模影响显著，但对利润水平影响较小。"},{"label":"D","text":"电价的微小变化对高耗能企业的生产规模和利润水平影响均显著。"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1451"},{"stem":"一般制造业企业收入成本对电价的敏感性主要表现为以下（）。","type":"单选","options":[{"label":"A","text":"电价的波动对一般制造业企业的生产成本影响较小，但对其产品价格影响较大"},{"label":"B","text":"电价的波动对一般制造业企业的生产成本和利润水平影响均不显著"},{"label":"C","text":"电价的波动对一般制造业企业的生产成本有一定影响，但可通过调整生产效率或产品价格来部分抵消"},{"label":"D","text":"电价的波动对一般制造业企业的生产成本影响显著，且无法通过其他方式缓解"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1452"},{"stem":"发电企业电力现货市场交易风险类型可以分为内部风险和外部风险两类，其中外部风险包括交易规则设计风险、市场信息掌握风险、自然环境和社会发展风险以及（）等。","type":"单选","options":[{"label":"A","text":"经济政策风险"},{"label":"B","text":"技术革新风险"},{"label":"C","text":"交易历史数据风险"},{"label":"D","text":"设备管理风险"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1453"},{"stem":"2015年，中央电改9号文印发后，输配电价过渡到按（）原则，分电压等级分用户类别核定。","type":"单选","options":[{"label":"A","text":"成本加成"},{"label":"B","text":"“准许成本+准许收益”"},{"label":"C","text":"“合理成本加合理收益”"},{"label":"D","text":"“准许成本加合理收益”"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1454"},{"stem":"绿电交易结算的方式是（）","type":"单选","options":[{"label":"A","text":"季结季清"},{"label":"B","text":"月结月清"},{"label":"C","text":"年结年清"},{"label":"D","text":"按项目进度结算"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1455"},{"stem":"绿色电力环境价值（绿电溢价费用）结算电量依据以下（）确定。","type":"单选","options":[{"label":"A","text":"月度绿电交易合同电量与发电主体上网电量的最大值"},{"label":"B","text":"月度绿电交易合同电量、发电主体上网电量、零售用户用电量三者最大值"},{"label":"C","text":"月度绿电交易合同电量、发电主体上网电量、零售用户用电量三者最小值"},{"label":"D","text":"发电主体上网电量与零售用户用电量的平均值"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1456"},{"stem":"同一发电企业与多个电力用户/售电公司签约，当总上网电量低于总合同电量时，该发电企业对应于各电力用户/售电公司的上网电量应（）。","type":"单选","options":[{"label":"A","text":"按各电力用户/售电公司合同电量占总合同电量比重等比例调增"},{"label":"B","text":"按总上网电量占总合同电量比重等比例调减"},{"label":"C","text":"随机调整各电力用户/售电公司的上网电量"},{"label":"D","text":"保持各电力用户/售电公司合同电量不变"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1457"},{"stem":"在VaR模型中，以下（）不是其计算方法。","type":"单选","options":[{"label":"A","text":"历史模拟法"},{"label":"B","text":"蒙特卡罗模拟法"},{"label":"C","text":"极值法"},{"label":"D","text":"线性回归法"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1458"},{"stem":"以下（）不是交易风险中的一种。","type":"单选","options":[{"label":"A","text":"操作风险"},{"label":"B","text":"流动性风险"},{"label":"C","text":"市场合规意识淡薄"},{"label":"D","text":"声誉风险"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1459"},{"stem":"在电力市场中，以下（）情况最有可能表明存在市场力风险。","type":"单选","options":[{"label":"A","text":"电力需求在一天内出现波动，如早高峰和晚高峰用电量高于其他时段"},{"label":"B","text":"某发电企业因技术故障导致其发电机组暂时停运，使得市场上的电力供应量有所减少"},{"label":"C","text":"某发电企业在市场中占有较大份额，且在用电高峰时段持续报出远高于边际成本的高电价，而其他发电企业也纷纷跟风提价"},{"label":"D","text":"电力监管部门对电力市场交易规则进行了调整，增加了市场交易的透明度和公平性"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1460"},{"stem":"根据《国家能源局关于进一步加强电力市场管理委员会规范运作的指导意见》（国能发监管〔2023〕57号文件），电力交易员在标准制定中的角色主要体现在（）方面。","type":"单选","options":[{"label":"A","text":"直接推动市场交易管理规范的出台"},{"label":"B","text":"参与企业标准、团体标准和行业标准的联合编制"},{"label":"C","text":"独立制定电力市场交易规则"},{"label":"D","text":"负责电力市场管理委员会的日常运作"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1461"},{"stem":"根据《广东电力市场管理实施细则》（信用管理部分），市场履约风险分类主要分为交易履约风险和（）两类。","type":"单选","options":[{"label":"A","text":"结算履约风险"},{"label":"B","text":"清算履约风险"},{"label":"C","text":"支付履约风险"},{"label":"D","text":"合约履约风险"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1462"},{"stem":"在电力交易结算过程中，以下（）因素不是导致结算履约风险的主要原因。","type":"单选","options":[{"label":"A","text":"法律和监管机构对结算流程的要求"},{"label":"B","text":"市场经营主体资金流动性问题"},{"label":"C","text":"结算过程中的会计和结算错误"},{"label":"D","text":"市场经营主体的市场份额大小"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1463"},{"stem":"根据《电力市场运行基本规则》，电力市场中市场运营者对市场经营主体的风险控制办法可以分为信用评估与风险计算两个部分。市场运营者在进行风险控制时，应确保市场经营主体的哪一项指标必须大于等于其
