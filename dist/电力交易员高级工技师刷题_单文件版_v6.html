","text":"高低匹配"},{"label":"D","text":"滚动报价、撮合成功"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1527"},{"stem":"为降低市场操纵风险，发电企业在单笔电力交易中的购电量不得超过（）。","type":"单选","options":[{"label":"A","text":"其剩余最大发电能力"},{"label":"B","text":"其售出电能量的净值"},{"label":"C","text":"其购入电能量的净值"},{"label":"D","text":"其实际上网电量"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1528"},{"stem":"关于偏差电量处理机制，允许发用双方在协商一致的前提下，可在合同执行（）前进行动态调整。鼓励市场主体通过月内（多日）交易实现月度发用电计划调整，减少合同执行偏差。","type":"单选","options":[{"label":"A","text":"三日"},{"label":"B","text":"一周"},{"label":"C","text":"半个月"},{"label":"D","text":"一个月"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1529"},{"stem":"滚动撮合交易是指在规定的交易起止时间内，电力交易平台按照（）的原则进行滚动撮合成交。","type":"单选","options":[{"label":"A","text":"时间优先、电量优先"},{"label":"B","text":"电量优先、价格优先"},{"label":"C","text":"时间优先、价格优先"},{"label":"D","text":"时间优先、电量优先"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1530"},{"stem":"月内（多日）交易的标的物为（）或者特定天数的电量（或者分时电量）。","type":"单选","options":[{"label":"A","text":"月内剩余天数"},{"label":"B","text":"当月总天数"},{"label":"C","text":"一周内"},{"label":"D","text":"D+2日和D+3日"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1531"},{"stem":"在绿色电力交易中，电力用户如何证明其消纳了绿色电力（）","type":"单选","options":[{"label":"A","text":"出示购电合同"},{"label":"B","text":"出示绿色电力证书"},{"label":"C","text":"出示电费账单"},{"label":"D","text":"出示政府批文"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1532"},{"stem":"在“十四五”省级人民政府节能目标责任评价考核指标核算中，实行以（）为基础、跨省绿证交易为补充的可再生能源消费量扣除政策。","type":"单选","options":[{"label":"A","text":"发电量"},{"label":"B","text":"交易电量"},{"label":"C","text":"结算电量"},{"label":"D","text":"物理电量"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1533"},{"stem":"参与跨省可再生能源市场化交易或绿色电力交易对应的电量，按（）计入受端省份可再生能源消费量。","type":"单选","options":[{"label":"A","text":"发电量"},{"label":"B","text":"交易电量"},{"label":"C","text":"物理电量"},{"label":"D","text":"结算电量"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1534"},{"stem":"受端省份通过绿证交易抵扣的可再生能源消费量，原则上不超过本地区完成“十四五”能耗强度下降目标所需节能量的（）%。","type":"单选","options":[{"label":"A","text":"20"},{"label":"B","text":"30"},{"label":"C","text":"40"},{"label":"D","text":"50"},{"label":"E","text":"60"}],"answer":["D"],"levels":["技师"],"scope":"技师新增","id":"Q1535"},{"stem":"交易机构发布交易结果后，市场主体对交易结果有异议的，应当在结果发布后的（）个工作日内向电力交易机构提出，由电力交易机构会同电力调度机构在（）个工作日内给予解释。","type":"单选","options":[{"label":"A","text":"1,2"},{"label":"B","text":"1,3"},{"label":"C","text":"1,1"},{"label":"D","text":"2,1"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1536"},{"stem":"跨区跨省交易的标的物为（）。","type":"单选","options":[{"label":"A","text":"交易电量"},{"label":"B","text":"分时段的电能量"},{"label":"C","text":"成交价格"},{"label":"D","text":"电力曲线"}],"answer":["B"],"levels":["技师"],"scope":"技师新增","id":"Q1537"},{"stem":"在挂牌交易期间，原则上，如果同一笔挂牌意向被多个市场主体摘牌，原则上按照摘牌“（）”原则依序形成交易合同。","type":"单选","options":[{"label":"A","text":"时间优先"},{"label":"B","text":"价格优先"},{"label":"C","text":"清洁能源优先"},{"label":"D","text":"节能环保优先"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1538"},{"stem":"在普通商品市场上，远期与现货市场的价差随着时间的推移会慢慢消失，远期价格必须能够反映现货价格的。","type":"单选","options":[{"label":"A","text":"最优值"},{"label":"B","text":"出清值"},{"label":"C","text":"期望值"},{"label":"D","text":"最大值"}],"answer":["C"],"levels":["技师"],"scope":"技师新增","id":"Q1539"},{"stem":"绿证市场初期，为防范市场炒作，保障平稳运行，绿证仅可交易（）次。","type":"单选","options":[{"label":"A","text":"1"},{"label":"B","text":"2"},{"label":"C","text":"3"},{"label":"D","text":"4"}],"answer":["A"],"levels":["技师"],"scope":"技师新增","id":"Q1540"},{"stem":"职业分类的依据包括（）。","type":"多选","options":[{"label":"A","text":"行业类型"},{"label":"B","text":"工作性质"},{"label":"C","text":"员工年龄"},{"label":"D","text":"工作环境"},{"label":"E","text":"技能要求F.员工学历"}],"answer":["A","B","D","E"],"levels":["技师"],"scope":"技师新增","id":"Q1541"},{"stem":"水力发电是水能利用的一种重要方式，以下关于水力发电的说法正确的是（）。","type":"多选","options":[{"label":"A","text":"水力发电按调节周期可分为无调节、日调节、周调节、年调节和多年调节，其中无调节是指水库没有调节库容，按天然流量供水。"},{"label":"B","text":"水力发电站的工作原理包括蓄水、引水、推动水轮机、发电机产生电能、排水这几个步骤。"},{"label":"C","text":"水力发电具有清洁可再生、运行成本低、调峰能力强的优点，但也存在建设周期长、初期投资大、受地理限制以及可能对环境和生态造成影响的缺点。"},{"label":"D","text":"径流式水电站不需要大型水库，建设成本相对较低，对河道的自然流量和生态系统影响较小，发电量稳定不受季节和气候变化影响。"},{"label":"E","text":"抽水蓄能电站是一种特殊的水电站，在用电低谷时抽水蓄能，用电高峰时放水发电，其转换效率为75%，上网电价与其他电源有根本区别。"}],"answer":["A","B","C","E"],"levels":["技师"],"scope":"技师新增","id":"Q1542"},{"stem":"下列关于风力发电的描述正确的包括（）。","type":"多选","options":[{"label":"A","text":"风力发电机按照多种方式分类，其中按照供电形式可分为离网型和并网型。"},{"label":"B","text":"风电上网电价目前正从保障性收购电价向市场化店家转变。"},{"label":"C","text":"风力发电基本工作原理中的产生电能步骤是基于电磁感应原理，通过旋转的机械能使发电机内部磁场变化产生电流"},{"label":"D","text":"风力发电具有清洁可再生的特性，但也存在调峰能力有限和可预测性较低的缺点"},{"label":"E","text":"在风力发电中，不论何种类型的风力发电机，都必须通过齿轮箱连接叶片和发电机来实现发电"}],"answer":["A","B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1543"},{"stem":"中国能源体系规划基本原则主要包括（）","type":"多选","options":[{"label":"A","text":"保障安全，绿色低碳"},{"label":"B","text":"创新驱动，智能高效"},{"label":"C","text":"深化改革，扩大开放"},{"label":"D","text":"盈利优先，提高产能"},{"label":"E","text":"民生优先，共享发展"}],"answer":["A","B","C","E"],"levels":["技师"],"scope":"技师新增","id":"Q1544"},{"stem":"下列关于需求曲线和供给曲线说法正确的有（）。","type":"多选","options":[{"label":"A","text":"从整个市场来看，可以认为供给曲线是向下的"},{"label":"B","text":"夏季气温的升高会导致对空调需求的增加等,会使需求曲线向右上移动"},{"label":"C","text":"供给法则的存在主要是由于生产者生产产品或提供服务的边际成本递增规律"},{"label":"D","text":"需求曲线一般是稳定不变的"},{"label":"E","text":"需求曲线与供给曲线变化趋势通常相同"}],"answer":["B","C"],"levels":["技师"],"scope":"技师新增","id":"Q1545"},{"stem":"下列关于供需平衡说法正确的有（）。","type":"多选","options":[{"label":"A","text":"需求曲线与供给曲线相交即为供需平衡"},{"label":"B","text":"供需平衡点，需求量与供给量相等，市场达到了均衡。在这一点价格既没有上升，也没有下降的趋势，这一点的价格被称为市场出清价格或市场清除价"},{"label":"C","text":"在平衡点，所有消费者的需求都得到了满足，所有生产者的产品都可以卖出去"},{"label":"D","text":"当价格高于平衡价格，生产者愿意供给的产品量比消费者愿意购买的产品量少"},{"label":"E","text":"当价格略低于平衡价格，能够实现社会福利最大化"}],"answer":["A","B","C"],"levels":["技师"],"scope":"技师新增","id":"Q1546"},{"stem":"关于消费者剩余、生产者剩余和社会福利，以下说法正确的是（）","type":"多选","options":[{"label":"A","text":"消费者剩余等于消费者愿意支付的最高金额与实际支付金额之差"},{"label":"B","text":"生产者剩余等于厂商的总收益与总成本之和"},{"label":"C","text":"社会福利等于消费者剩余与生产者剩余之和"},{"label":"D","text":"市场效率最大化的条件是价格等于边际成本"},{"label":"E","text":"当市场为垄断市场时，社会福利达到最大值"}],"answer":["A","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1547"},{"stem":"在电力行业中，下列哪些定价方法属于非线性定价（）","type":"多选","options":[{"label":"A","text":"工业用户、商业用户、居民用户采取不同电价"},{"label":"B","text":"峰谷电价，即高峰时段电价高，低谷时段电价低"},{"label":"C","text":"按照输电网络的不同节点和支路分别定价"},{"label":"D","text":"所有用户统一采用按边际成本定价"},{"label":"E","text":"用电量越多，电价越高，实行阶梯电价制度"}],"answer":["A","B","C","E"],"levels":["技师"],"scope":"技师新增","id":"Q1548"},{"stem":"“十四五”时期现代能源体系建设的主要目标包括（）","type":"多选","options":[{"label":"A","text":"能源保障更加安全有力"},{"label":"B","text":"能源低碳转型成效显著"},{"label":"C","text":"能源系统效率大幅提高"},{"label":"D","text":"创新发展能力显著增强"},{"label":"E","text":"普遍服务水平持续提升"}],"answer":["A","B","C","D","E"],"levels":["技师"],"scope":"技师新增","id":"Q1549"},{"stem":"假设在一个多物品拍卖中，电力公司A的发电机组可以同时参与电能量市场和辅助服务市场。假设电能量市场和辅助服务市场的出清价格分别为P1和P2。在这种情况下，电力公司的报价策略应考虑以下（）因素。","type":"多选","options":[{"label":"A","text":"电能量市场的边际成本和辅助服务市场的边际成本可能会相互影响，因此需要在两个市场之间进行价格协调。"},{"label":"B","text":"由于电能量和辅助服务产品的成本紧密相连，电力公司A的报价应同时考虑两者的联合利润最大化。"},{"label":"C","text":"电力公司A只需关注电能量市场的价格，不需要考虑辅助服务市场的出清价格。"},{"label":"D","text":"电力公司A的报价应考虑到辅助服务市场的价格波动，因为辅助服务市场的价格可能影响到电能量市场的价格。"},{"label":"E","text":"电力公司A应忽视辅助服务市场的价格，因为电能量市场的价格决定了其所有的盈利潜力"}],"answer":["A","B","D"],"levels":["技师"],"scope":"技师新增","id":"Q1550"},{"stem":"在电力市场中，关于报价、定价和市场出清，下列说法正确的是（）。","type":"多选","options":[{"label":"A","text":"用户报价通常是单调递增的，发电报价通常是单调递减的。"},{"label":"B","text":"分段阶梯型和分段线性型是两种常见的报价曲线类型。"},{"label":"C","text":"市场出清的目标是社会福利最大化，在单调报价情况下出清结果唯一。"},{"label":"D","text":"参与理性原则要求发电的结算价不低于报价，用户的结算价不高于报价。"},{"label":"E","text":"在市场出清后，所有市场成员的社会福利总是相同的。"}],"answer":["B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1551"},{"stem":"2000年以来，我国电力体制改革主要政策文件包括（）","type":"多选","options":[{"label":"A","text":"《国务院办公厅转发国家经贸委关于深化电力工业体制改革有关问题意见的通知》"},{"label":"B","text":"《关于印发电力体制改革方案的通知》"},{"label":"C","text":"《关于进一步深化电力体制改革的若干意见》"},{"label":"D","text":"《关于加快建设全国统一电力市场体系的指导意见》"},{"label":"E","text":"《关于深化电力体制改革加快构建新型电力系统的指导意见》"}],"answer":["B","C","D","E"],"levels":["技师"],"scope":"技师新增","id":"Q1552"},{"stem":"以下关于电力调度体系的说法正确的包括（）。","type":"多选","options":[{"label":"A","text":"电力系统调度自动化系统中，SCADA主要负责数据采集和监控。"},{"label":"B","text":"电力系统负荷预测的主要目的是为了合理安排发电计划，实现电力系统的安全、经济运行。"},{"label":"C","text":"电力市场交易系统属于电力系统调度自动化系统的一部分。"},{"label":"D","text":"在电力系统调度运行中，调度员无权对发电厂的发电计划进行调整。"},{"label":"E","text":"随着分布式能源的大规模接入，小型分布式资源可通过聚合商或虚拟电厂的形式在先进计量基础设施和能源管理系统支持下实现群控群调。"}],"answer":["A","B","E"],"levels":["技师"],"scope":"技师新增","id":"Q1553"},{"stem":"以下属于《电力法》的主要内容的是（）。","type":"多选","options":[{"label":"A","text":"总则。"},{"label":"B","text":"‌电力建设。"},{"label":"C","text":"‌电力生产与电网管理。"},{"label":"D","text":"‌电力供应与使用。"},{"label":"E","text":"电价与电费。"}],"answer":["A","B","C","D","E"],"levels":["技师"],"scope":"技师新增","id":"Q1554"},{"stem":"关于电力系统潮流分析，（）的说法是正确的。","type":"多选","options":[{"label":"A","text":"也被称为负荷流分析或功率流分析；"},{"label":"B","text":"已知发电机功率输出、负荷需求；"},{"label":"C","text":"已知电网的拓扑结构和线路参数；"},{"label":"D","text":"已知各节点（或叫母线）的电压幅值和相位角；"},{"label":"E","text":"计算结果包括输电线路和变压器上的功率流动和损耗。"}],"answer":["A","B","C","E"],"levels":["技师"],"scope":"技师新增","id":"Q1555"},{"stem":"中国电力市场主要交易周期包括（）","type":"多选","options":[{"label":"A","text":"多年"},{"label":"B","text":"年"},{"label":"C","text":"月"},{"label":"D","text":"多日"},{"label":"E","text":"日前、日内和实时"}],"answer":["A","B","C","D","E"],"levels":["技师"],"scope":"技师新增","id":"Q1556"},{"stem":"售电公司可以采取多种方式通过电力市场购售电，可通过电力交易平台开展（）交易。","type":"多选","options":[{"label":"A","text":"场内协商"},{"label":"B","text":"场外集中"},{"label":"C","text":"场内集中竞价"},{"label":"D","text":"双边协商"},{"label":"E","text":"金融"}],"answer":["C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1557"},{"stem":"售电公司可向用户提供以下（）服务。","type":"多选","options":[{"label":"A","text":"合同能源管理"},{"label":"B","text":"综合节能"},{"label":"C","text":"合理用能咨询"},{"label":"D","text":"用电设备运维"},{"label":"E","text":"电费贷款"}],"answer":["A","B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1558"},{"stem":"机组启动过程中的启动成本包括（）。","type":"多选","options":[{"label":"A","text":"燃料费用" ":"E","text":"相对误差"}],"answer":["A","B","C","D","E"],"levels":["技师"],"scope":"技师新增","id":"Q1663"},{"stem":"电价预测方法包括（）。","type":"多选","options":[{"label":"A","text":"时间序列方法预测"},{"label":"B","text":"机器学习算法预测"},{"label":"C","text":"基于市场均衡的现货价格预测"},{"label":"D","text":"人工智能算法预测"},{"label":"E","text":"基于历史出清价格加权平均"}],"answer":["A","B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1664"},{"stem":"电力交易机构向经营主体出具的绿色电力交易结算依据包含以下（）内容。","type":"多选","options":[{"label":"A","text":"绿色电力交易电能量偏差结算费用"},{"label":"B","text":"零售侧绿色电力交易相关结算依据"},{"label":"C","text":"可再生能源补贴费用"},{"label":"D","text":"绿色电力交易电能量结算电量"},{"label":"E","text":"碳排放指标交易费用"}],"answer":["A","B","D"],"levels":["技师"],"scope":"技师新增","id":"Q1665"},{"stem":"发电企业的价格预测主要根据（）方面来分类。","type":"多选","options":[{"label":"A","text":"预测点范围"},{"label":"B","text":"时间长短"},{"label":"C","text":"预测内容"},{"label":"D","text":"预测特性"},{"label":"E","text":"发电成本"}],"answer":["A","B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1666"},{"stem":"经营主体注册登记和交易资质审核的目的是（）。","type":"多选","options":[{"label":"A","text":"确保经营主体的真实、完整、准确"},{"label":"B","text":"评估经营主体的经营范围、财务状况、信用记录"},{"label":"C","text":"确定经营主体是否具备参与电力市场的资格和能力"},{"label":"D","text":"关注相关政策法规的变化"},{"label":"E","text":"促进市场竞争的活跃度​"}],"answer":["A","B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1667"},{"stem":"监测市场运行和分析市场动态的目的是（）。","type":"多选","options":[{"label":"A","text":"收集市场信息，包括供需情况、价格走势、政策变化"},{"label":"B","text":"运用专业的分析方法和工具对市场信息进行深入剖析和解读"},{"label":"C","text":"帮助经营主体准确把握市场动态和趋势，做出科学的决策"},{"label":"D","text":"提高市场的透明度和公信力"},{"label":"E","text":"直接干预市场价格以稳定市场"}],"answer":["A","B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1668"},{"stem":"交易结算和纠纷处理的目的是（）。","type":"多选","options":[{"label":"A","text":"组织和监督交易结算工作，确保交易资金的及时清算和支付"},{"label":"B","text":"核对和确认交易数据，防止出现误差和纠纷"},{"label":"C","text":"调查交易纠纷，提出处理意见并协调和解"},{"label":"D","text":"协助经营主体通过仲裁或诉讼等方式解决纠纷"},{"label":"E","text":"制定市场交易规则和调整交易机制​"}],"answer":["A","B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1669"},{"stem":"账号权限设置的目的是（）。","type":"多选","options":[{"label":"A","text":"确保账号只能访问和操作其被授权的资源"},{"label":"B","text":"根据账号的角色和职责进行精细划分"},{"label":"C","text":"采用基于角色的访问控制方法，将权限与角色相关联"},{"label":"D","text":"确保每个账号只能访问和操作其被授权的资源"},{"label":"E","text":"允许所有用户默认拥有最高权限以简化管理​"}],"answer":["A","B","C","D"],"levels":["技师"],"scope":"技师新增","id":"Q1670"},{"stem":"以下（）属于煤炭价格指数。","type":"多选","options":[{"label":"A","text":"BSPI指数"},{"label":"B","text":"CCTD指数"},{"label":"C","text":"CECI指数"},{"label":"D","text":"CIF指数"},{"label":"E","text":"CLD指数"}],"answer":["A","B","C"],"levels":["技师"],"scope":"技师新增","id":"Q1671"},{"stem":"ARMA模型是专门用于拟合非平稳时间序列的模型。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1672"},{"stem":"数据申报业务主要指各类市场主体通过信息外网申报市场交易相关的各类业务信息的业务活动。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1673"},{"stem":"发电企业机组检修计划属于公开信息。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1674"},{"stem":"集中竞价交易可采用边际出清或者高低匹配等价格形成机制。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1675"},{"stem":"绿色电力交易中，发电企业可以自由选择是否参与交易，无需满足特定的条件。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1676"},{"stem":"某屋顶光伏装机容量为10kW，年发电量在12000kWh左右，据此推算，该屋顶光伏应在三类地区。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1677"},{"stem":"在电力市场中，VaR模型可以直接应用而无需任何改进","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1678"},{"stem":"燃料成本占燃煤发电企业的发电成本不到50%，对发电企业经营管理、市场竞争力具有较大影响。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1679"},{"stem":"激励需求侧资源参与供需互动和电网调峰、提高用户侧用能效率，也是批发市场和零售市场协同的重要环节之一。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1680"},{"stem":"需求响应资源无法参与辅助服务市场。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1681"},{"stem":"省间联络线输电曲线预测是现货市场必须公开的信息。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1682"},{"stem":"电力交易机构应当定期向市场主体出具信息披露报告，内容应当包含但不限于电网概况、电力供需及预测情况、市场准入、市场交易、市场结算、市场建设违规情况、市场干预情况等方面。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1683"},{"stem":"电网企业负责电网概况、电力供需及预测情况、市场准入、市场交易、市场结算、市场建设、违规情况、市场干预情况等相关信息的披露管理。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1684"},{"stem":"市场竞争所需信息应当充分披露、交易机构对市场主体披露信息的真实性、准确性、及时性负责。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1685"},{"stem":"信息披露主体按照自定义格式通过信息披露平台向电力交易机构提供信息。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1686"},{"stem":"根据《电力市场信息披露基本规则》，电力市场信息只能通过信息披露平台进行披露，不能通过其他渠道发布。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1687"},{"stem":"保密管理在企业和组织中扮演着至关重要的角色，包括保护敏感信息、确保企业遵守法律法规、增强信任度等。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1688"},{"stem":"交易结算和纠纷处理是电力市场交易的无关环节，不影响经营主体的权益。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1689"},{"stem":"交易场所的安全稳定运行需要建立安全政策和标准操作程序，安全监测和日志记录机制，以及定期的安全评估和审计。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1690"},{"stem":"账号权限设置的目的是确保账号只能访问和操作其被授权的资源，通常采用基于角色的访问控制方法，将权限与角色相关联。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1691"},{"stem":"交易规则是由政府基于国家经济发展规律的客观要求和一定时期内国家产业现状和发展趋势，综合运用经济手段制定的对调整产业结构、指导行业发展和运行、提升行业国际竞争力等形成的一系列行动方案或行动准则的总称。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1692"},{"stem":"在部分现货正式运行的省份，中长期交易可以理解为带金融属性的差价合约方式。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1693"},{"stem":"当某一次的交易机会出现适合自身的价格信号时，激进的全仓投入做法未必会在未来的一段周期内取得最大的收益。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1694"},{"stem":"采取年度、月度、月内按照一定的电量比例进行交易，将收益和风险分摊到每个执行月份，给每次交易都留有机会。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1695"},{"stem":"下一个年度的市场交易组织，常常从月度交易最先开始。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1696"},{"stem":"电力价格是影响市场化用户用电量的重要因素。电力价格信号的引导作用使得用户在价格较高时减少用电。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1697"},{"stem":"随着经济的增长，企业生产和居民生活对电力的需求不断增加，从而推动用电量的增长。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1698"},{"stem":"不同产业的用电需求存在差异，但产业结构的变化并不会对市场化用户用电量产生影响。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1699"},{"stem":"对于用电企业在现货分区结算时，中长期合约尽量选择与自身用电地理区域一致或接近的发电企业，规避不同计量点带来的市场风险。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1700"},{"stem":"发电侧上下调预挂牌机制采用“报价不报量”方式，所有市场化机组均应当参与上下调报价。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1701"},{"stem":"根据《电力中长期交易基本规则》，电力用户拥有储能，或者电力用户参加特定时段的需求侧响应，由此产生的偏差电量，由电力用户自行承担。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1702"},{"stem":"电力中长期交易现阶段主要开展电能量交易，灵活开展发电权交易、合同转让交易，根据市场发展需要开展输电权、容量等交易。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1703"},{"stem":"集中式电力市场以中长期实物合约管理市场风险，配合现货交易采用全电量集中竞价的电力市场模式。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1704"},{"stem":"在分散式市场模式下，发电厂商利用中长期差价合约、日前及日内市场投标、实时平衡市场调增调减平衡机制投标来实现对自己发电计划曲线的决策和修正。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1705"},{"stem":"集中竞价交易指设置交易报价提交截止时间，电力交易平台汇总市场主体提交的交易申报信息，按照市场规则进行统一的市场出清，发布市场出清结果。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1706"},{"stem":"滚动撮合交易是指在规定的交易起止时间内，市场主体可以随时提交购电或者售电信息，电力交易平台按照时间优先、价格优先的原则进行滚动撮合成交。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1707"},{"stem":"挂牌交易指市场主体通过电力交易平台，将需求电量或者可供电量的数量和价格等信息对外发布要约，由符合资格要求的另一方提出接受该要约的申请。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1708"},{"stem":"同一市场主体可根据自身电力生产或者消费需要，购入或者售出电能量。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1709"},{"stem":"中长期中月度交易的标的物为当月电量（或者月度分时电量），条件具备的地区可组织开展针对年度内剩余月份的月度电量（或者月度分时电量）交易。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1710"},{"stem":"月内（多日）交易的标的物为月内剩余天数或者特定天数的电量（或者分时电量）。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1711"},{"stem":"当售电公司所有签约用户月度实际总用量偏离售电公司月度交易计划时，电力用户直接承担偏差电量电费。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1712"},{"stem":"电力交易中心负责绿色电力交易的结算工作，确保交易双方的权益得到保障。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1713"},{"stem":"绿色电力交易的价格完全由市场供求关系决定，政府不进行任何形式的干预。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1714"},{"stem":"绿色电力交易仅包括风电、光伏发电等新能源电力交易。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1715"},{"stem":"绿色电力环境价值按当月合同电量、发电企业上网电量、电力用户用电量三者取大的原则确定结算电量（以MWh为单位取整数，尾差不累计），以绿色电力环境价值结算，绿色电力环境价值偏差电量按照合同明确的绿色电力环境价值偏差补偿条款执行，由违约方向合同对方支付补偿费用。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1716"},{"stem":"若预测现货出清价格高于中长期市场合约价格，发电企业保持上限仓位，可在现货市场中获得高收益","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1717"},{"stem":"电力中长期交易结果判定方法主要包括事前预测、事中监控和事后复盘三个环节。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1718"},{"stem":"除国家有明确规定的情况外，双边协商交易原则上不进行限价。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1719"},{"stem":"发电商的实际电能生产量减去净电能交易量为差值为正，表明发电商向系统出售这一数量的多余电能。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1720"},{"stem":"电能量市场化交易（含省内和跨区跨省）价格不包括脱硫、脱硝、除尘和超低排放电价。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1721"},{"stem":"对于未来电力供应存在短缺风险的地区，可探索建立辅助服务市场，保障长期电力供应安全。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1722"},{"stem":"跨省跨区交易输电损耗原则上由卖方承担，也可由市场主体协商确定承担方式。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1723"},{"stem":"一般来说，供大于求时，电价可能下跌；而需大于供时，电价可能上涨。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1724"},{"stem":"集中竞价交易中，为避免市场操纵以及恶性竞争，可对结算价格设置上、下限。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1725"},{"stem":"根据《售电公司管理办法》，对于在多个省开展售电业务的售电公司，无需分别提交履约保函或保险。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1726"},{"stem":"待条件成熟时，探索开展电力期货和电力场外衍生品交易，为发电企业、售电主体和用户提供远期价格基准和风险管理手段。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1727"},{"stem":"加快建设以绿电交易为主的可再生能源消纳体系和绿色消费认证体系。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1728"},{"stem":"集中竞价交易可采用边际出清、高低匹配等价格形成机制。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1729"},{"stem":"跨区跨省的政府间协议原则上在上一年度的11月底前预测和下达总体电力电量规模和分月计划，由购售双方签订相应的购售电合同。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1730"},{"stem":"《售电公司管理办法》发改体改规〔2021〕1595号）规定，电力用户、售电公司与电网企业应签订三方电费结算补充协议，并签订售电公司、电力用户、电网企业三方合同。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1731"},{"stem":"美国PJM电力市场评价模型重点对市场行为和市场操纵力进行评估，防止形成市场垄断。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1732"},{"stem":"市场建设初期，我国可通过容量补偿机制起步，未来逐步探索建立容量市场。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1733"},{"stem":"享受国家补贴的可再生能源发电企业，参与电力市场时，市场交易价格高于（低于）当地燃煤基准电价部分，等额扣除（增加）国家补贴资金。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1734"},{"stem":"日内市场的主要作用在于为市场成员提供一个在日前市场关闭后对其发用电计划进行微调的交易平台，以应对日内的各种预测偏差及非计划状况，其交易规模往往较小。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1735"},{"stem":"实时市场则往往在小时前由调度中心组织实施，非常接近系统的实时运行，因而其主要作用并不在于电量交易，而在于为电力系统的阻塞管理和辅助服务提供调节手段与经济信号，真实反映系统超短期的资源稀缺程度与阻塞程度；并形成与系统实际运行切合度高的发用电计划，保证电网的安全运行。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1736"},{"stem":"分区边际电价模式适用于阻塞频繁发生在部分输电断面的地区。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1737"},{"stem":"《关于深化电力现货市场建设试点工作的意见》中指出，电力现货市场申报和出清限价设置应以促进用户侧削峰填谷、消纳清洁能源和防范价格异常波动为基本原则，避免因上下限设置不合理而影响价格信号发挥作用。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1738"},{"stem":"我国第一批现货试运行省份中，部分地区允许出清价格为负。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1739"},{"stem":"用电负荷大幅下降，风光新能源大发，市场竞价空间大幅压缩，导致市场出清价格降低。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1740"},{"stem":"对于电网阻塞程度较为严重、输电能力受限的地区，宜采用节点边际电价机制","type":"判断","options":[{"label":"对","text":"对"},{"label" 煤发电电量上网电价，“基准价+上下浮动”的价格机制已不再执行。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1791"},{"stem":"碳交易政策提升企业能效的主要驱动力是通过碳成本压力优化能耗","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1792"},{"stem":"数据清洗与预处理是数据挖掘的前置步骤，其目的是确保数据的准确性和一致性，以提高分析结果的质量。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1793"},{"stem":"特征选择与提取技术通过减少数据维度，帮助去除冗余信息，从而提高模型的训练效率和预测能力。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1794"},{"stem":"特征提取技术可显著提升模型的关键信息识别能力。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1795"},{"stem":"高新技术企业经营对电价水平变化的敏感性较低。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1796"},{"stem":"服务业企业经营对电价水平变化的敏感性较低。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1797"},{"stem":"提高附加值，通过技术创新和提升服务质量，是高新技术企业减轻电价波动影响的关键策略之一。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1798"},{"stem":"在市场竞争中，燃煤电厂之间开展的是完全信息博弈。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1799"},{"stem":"售电公司代理用户从发电商处购电，然后转卖给用户，从中赚取差价盈利。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1800"},{"stem":"同一电力用户与多个发电企业签约，若总用电量低于总合同电量，该电力用户对应于各发电企业的用电量应按各发电企业合同电量占总合同电量比重等比例调增。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1801"},{"stem":"聚合商用于结算的电能量部分上网电量为聚合的分布式发电主体实际上网电量合计值，聚合商用于结算的绿色电力环境价值部分电量为各分布式发电主体上网电量（以兆瓦时为单位取整数，在合同周期内尾差滚动到次月核算）的合计值。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1802"},{"stem":"绿证的单位是兆瓦时（MWh），每1兆瓦时的可再生能源电量对应1个绿证。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1803"},{"stem":"现阶段可交易绿证仅可交易一次。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1804"},{"stem":"电力用户未按时缴纳绿色电力环境价值费用时，电网企业应立即停止向其供电。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1805"},{"stem":"国外例如欧美的电力市场相比我国发展较早，因此我们可以充分借鉴国外企业进行市场开发的经验，直接应用到国内。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1806"},{"stem":"风险管理制度的编制过程中，监督和考核条款的设置仅是为了对员工进行约束，而非起到激励作用，且制度内容无需包含推动企业风险管理文化建设的相关内容。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1807"},{"stem":"电力供需偏差可分为短期和长期问题，短期电力供需不足通常与天气变化、设备故障、突发事件等因素有关。长期供需问题则可能与能源政策、市场经营主体装机容量和能源管理技术不足等因素相关。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1808"},{"stem":"VaR具体来说是指在给定持有期及置信度内，某一金融工具或投资组合所面临的最大损失。VaR模型的广泛应用表明它在金融（电力）市场风险度量方法的研究上有极大的优势。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1809"},{"stem":"在VaR模型中，持有期和置信水平是两个重要的参数，其取值是主观的，需要根据具体情况来设定。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1810"},{"stem":"电力市场的流动性风险涉及到市场经营主体在需要时能否迅速买卖电力，以及在交易过程中是否能够以合理的价格进行。由于电力产品的特殊性，其生产、传输和消费几乎是同步进行的，因此几乎不存在流动性风险。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1811"},{"stem":"在电力市场风险台账管理中，利用大数据分析和人工智能技术仅能提升风险台账的处理能力和分析水平，但无法实现风险预警功能。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1812"},{"stem":"电力交易员在编制市场交易管理相关文件时，主要关注文件的编制目的和依据，次要考虑行业自律的核心原则和价值观。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1813"},{"stem":"信用评估由国家主管部门、国家发展改革委统筹组织地方主管部门授权电力交易机构、第三方征信机构开展售电公司信用评价工作","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1814"},{"stem":"履约保函是一种金融担保工具，由银行或保险公司出具，保证在合同一方未能履行合同义务时，另一方可以获得经济赔偿。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1815"},{"stem":"中国电煤采购价格指数是反映报告期秦皇岛港及周边港口主流动力煤品种平仓交货价格水平的指标体系，由综合交易价、现货交易价和年度长协价三部分组成。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1816"},{"stem":"按照煤炭所在的市场，可以将煤炭价格类型划分为生产地价格、中转地价格和消费地价格。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1817"},{"stem":"从短期来看，天然气需求由整体经济和人口增长、环境政策、能源效率、科技变化、天然气和替代能源的价格关系所驱动。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1818"},{"stem":"美国亨利枢纽（HenryHub，HH）价格是整个北美天然气市场和部分全球液化天然气LNG市场的基准价，亨利枢纽位于路易斯安那州，是美国最具影响力的实体枢纽。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1819"},{"stem":"风力发电技术具有清洁低碳、环境成本低、资源可再生、永不枯竭、基建周期短、装机规模灵活等优点。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1820"},{"stem":"可再生能源由于变动成本低、有政策补贴，通常在市场中报低价以实现全部出清。可再生能源出力对市场的净负荷产生影响，进而影响市场供需关系和价格。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1821"},{"stem":"变动成本指与发电企业电能产量有直接关系的费用，这些费用不会随着电能产量的变化而变化，一般主要为燃料成本，包括空载成本和边际成本。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1822"},{"stem":"空载费用为发电机维持同步转速、输出电功率为零需要消耗的燃料费用，与出力水平无关，即机组在开机状态每个小时需要付出的成本。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1823"},{"stem":"电煤采购应坚持“长协为主，现货为辅”的原则，提升中长期合同在整体采购中占比，以现货比例的降低带动发电企业整体采购行为的不确定性同步下降，充分发挥中长期合同“压舱石”“稳定器”的作用。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1824"},{"stem":"电煤采购计划应结合发电企业实际情况，适当引入期货避险工具，确定合适的电煤采购及库存比例，从事煤炭期货套期保值操作，达到规避风险的目的。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1825"},{"stem":"应利用大数据、人工智能等技术，建立数字化煤炭采购管理平台，实现大数据流程化操作管理，提升电煤集中采购业务的专业水平，降低交易成本，提高采购效率。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1826"},{"stem":"年度、月度、月内合约比例不同，中长期合约收益的期望和标准差不同。不同的年度、月度、月内合约比例可构成中长期合约收益组合，所有中长期合约收益组合的集合即为中长期合约收益组合集。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1827"},{"stem":"当风险效用无差异曲线和中长期合约收益组合曲线相交时，交点即为最优的中长期合约收益组合，可确定最优的年度、月度、月内合约比例，即不同交易周期协同的交易组合策略。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1828"},{"stem":"在预测数据准确率相对较低的月度、多月甚至年度交易中，中长期曲线往往以直线、典型曲线为主，一般情况下不会对交易曲线有较多的差异化需求。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1829"},{"stem":"中长期合约为金融性质的差价合约，是控制现货市场风险，稳定盈利的关键。根据中长期市场的组成，可将中长期合约收益分解为年度交易、月度交易、月内交易等市场收益。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1830"},{"stem":"对自身中长期交易持仓情况分析，从时间周期角度分为月度、每日、每小时（分时段）中长期合约持仓量价情况分析。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1831"},{"stem":"电力辅助服务市场与电力现货市场具有强耦合性、具有功功率互补性、经济互斥性以及的出清模式的较大相关性。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1832"},{"stem":"电力现货市场和辅助服务市场单独出清模式下，一般先出清调频、旋转备用和非旋转备用，再出清电能量。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1833"},{"stem":"辅助服务的机会成本是指发电机组运行在电能量价格所对应的经济出力水平之上所产生的额外成本，或运行在电能量价格所对应的经济出力水平之下而放弃的利润。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1834"},{"stem":"电力现货市场与电力辅助服务市场具有有功功率互补性和经济互斥性。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1835"},{"stem":"将单位容量单位小时调频收益与电能量度电收益（度电收入与平均成本的差值）进行对比，可用于分析机组参与电能量市场收益高，还是参与调频市场收益高，可用于辅助服务交易策略分析制定。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1836"},{"stem":"机组运行在电能量价格所对应的经济出力水平之上所产生的额外成本为辅助服务机会成本。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1837"},{"stem":"省间现货价格高于省内现货价格，发电企业就有激励进入省间现货市场，但是机组的发电能力有限，进入省间市场的结果必然是抬高省内市场报价以减少省内市场中标，使省间市场多中标。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1838"},{"stem":"我国省间市场包括日前、日内和实时市场。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1839"},{"stem":"省间电力现货交易中，每个省只能有1个交易节点。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1840"},{"stem":"省间电力现货交易优先选择节点间输电价格（含网损折价）最低的交易路径开展交易。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1841"},{"stem":"省内现货市场运行时，省内发电企业实际发电出力低于省间电力现货交易电力时，省间电力现货交易电力相应减少。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1842"},{"stem":"省间电力现货交易中，交易节点内部平衡紧张时，节点内部卖方市场主体可在省间电力现货交易中卖出电能。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1843"},{"stem":"交叉需求弹性系数表示电力用户某一时段的负荷变动对电价变动的反应程度。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1844"},{"stem":"单时段响应是指电力用户某一时段的负荷受其他时段电价的影响，原负荷在各个时段内重新分配，将负荷从电价较高的时段转移到电价相对较低的时段。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"],"levels":["技师"],"scope":"技师新增","id":"Q1845"},{"stem":"根据电力需求弹性系数的定义和计算方法，对于多个时段，可以组合为电力用户的电力需求弹性系数矩阵。其中，矩阵对角线元素为自需求弹性系数，非对角线元素为交叉需求弹性系数，反映需求侧资源对电价的响应程度和调节能力。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1846"},{"stem":"批发市场和零售市场的协同，主要体现在零售套餐的设计上，以基于电力用户分群分析为基础，和批发市场衔接的零售套餐设计需要体现对批发市场价格的传导。","type":"判断","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"],"levels":["技师"],"scope":"技师新增","id":"Q1847"}]};

      const selectedSet = new Set(state.exam.answers[question.id] || []);
      const isMarked = state.exam.marked.includes(question.id);
      const tagClass = question.type === "多选" ? "multi" : question.type === "判断" ? "judge" : "";
      const optionsHtml = question.options.map((option) => {
        const selected = selectedSet.has(option.label);
        const classes = ["option", selected ? "selected" : ""].filter(Boolean).join(" ");
        return `
          <button class="${classes}" data-option="${option.label}" aria-pressed="${selected}">
            <span class="letter">${option.label}</span>
            <span class="option-text">${escapeHtml(option.text)}</span>
          </button>`;
      }).join("");
      const sheetHtml = state.exam.paper.map((item, index) => {
        const classes = [
          index === state.exam.index ? "current" : "",
          (state.exam.answers[item.id] || []).length ? "answered" : "",
          state.exam.marked.includes(item.id) ? "marked" : ""
        ].filter(Boolean).join(" ");
        return `<button class="${classes}" data-exam-index="${index}" aria-label="第${index + 1}题">${index + 1}</button>`;
      }).join("");

      els.questionCard.innerHTML = `
        <div class="question-head">
          <div class="tag-row">
            <span class="tag ${tagClass}">${question.type}</span>
            <span class="tag scope">${sourceLabel(state.exam.source)}</span>
            <span class="tag">第 ${state.exam.index + 1} / ${state.exam.paper.length} 题</span>
          </div>
          <button class="small-button compact" id="markExamButton">${isMarked ? "取消标记" : "标记"}</button>
        </div>
        <div class="question-head">
          <span class="progress-text">剩余 <span id="examTimer">${formatDuration(EXAM_RULE.durationSeconds - state.exam.elapsedSeconds)}</span></span>
          <span class="progress-text">${maxQuestionScore(question)} 分</span>
        </div>
        <div class="stem">${escapeHtml(question.stem)}</div>
        <div class="options">${optionsHtml}</div>
        <div class="answer-sheet">${sheetHtml}</div>`;

      els.questionCard.querySelectorAll("[data-option]").forEach((button) => {
        button.addEventListener("click", () => selectOption(button.dataset.option));
      });
      els.questionCard.querySelectorAll("[data-exam-index]").forEach((button) => {
        button.addEventListener("click", () => goExamQuestion(Number(button.dataset.examIndex)));
      });
      document.getElementById("markExamButton").addEventListener("click", toggleExamMark);
      els.skipButton.textContent = "上一题";
      els.skipButton.disabled = state.exam.index === 0;
      els.submitButton.disabled = false;
      els.submitButton.textContent = state.exam.index === state.exam.paper.length - 1 ? "交卷" : "下一题";
    }

    function renderExamResult() {
      els.actions.classList.add("hidden");
      const result = state.exam.result;
      const deductItems = result.details.filter((item) => item.score < item.max);
      const breakdownHtml = EXAM_RULE.sections.map((section) => {
        const item = result.byType[section.type];
        return `<div><strong>${item.score}/${item.max}</strong><span>${section.type}</span></div>`;
      }).join("");
      const reviewHtml = deductItems.length
        ? deductItems.map((item) => `
          <div class="review-item">
            <strong>${item.index + 1}. ${escapeHtml(item.question.stem)}</strong>
            你的答案：${escapeHtml(selectedAnswerText(item.question, item.selected))}<br>
            正确答案：${escapeHtml(answerText(item.question))}<br>
            得分：${item.score}/${item.max}<br>
            已自动加入错题本
          </div>`).join("")
        : `<div class="review-item"><strong>本次没有扣分题</strong>这套卷子全部拿分。</div>`;

      els.questionCard.innerHTML = `
        <div class="question-head">
          <div class="tag-row">
            <span class="tag scope">${sourceLabel(result.source)}</span>
            <span class="tag">模拟考试结果</span>
          </div>
          <span class="progress-text">${formatDuration(result.duration)}</span>
        </div>
        <div class="exam-score">
          <strong>${result.total}</strong>
          <span>满分 ${result.max} · 已答 ${result.answered}/${state.exam.paper.length}</span>
        </div>
        <div class="exam-breakdown">${breakdownHtml}</div>
        <div class="inline-actions">
          <button class="ghost" id="backPracticeButton">日常刷题</button>
          <button class="primary" id="restartExamButton">再考一套</button>
        </div>
        <div class="review-list">${reviewHtml}</div>`;

      document.getElementById("restartExamButton").addEventListener("click", startExam);
      document.getElementById("backPracticeButton").addEventListener("click", () => setView("practice"));
    }

    function renderExamHistory() {
      renderExamAnalysis();
      if (!state.exam.history.length) {
        els.examHistory.innerHTML = `<strong>最近成绩</strong>还没有模拟考试记录。`;
        return;
      }
      const items = state.exam.history.slice(0, 5).map((item) => {
        const date = new Date(item.at);
        const label = Number.isNaN(date.getTime()) ? "" : `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
        return `${label} · ${item.source} · ${item.score}分 · ${formatDuration(item.duration)}`;
      }).join("<br>");
      els.examHistory.innerHTML = `<strong>最近成绩</strong>${items}`;
    }

    function renderExamAnalysis() {
      const analysis = analyzeExamHistory(state.exam.history);
      if (!analysis.count) {
        els.examAnalysis.innerHTML = `<strong>成绩分析</strong>完成模拟考试后显示平均分、最高分、最低分和薄弱题型。`;
        return;
      }
      const typeText = Object.entries(analysis.byType)
        .filter(([, item]) => item.max > 0)
        .map(([type, item]) => `${type}${item.percent}%`)
        .join(" · ");
      els.examAnalysis.innerHTML = `<strong>成绩分析</strong>近 ${analysis.count} 次：平均 ${analysis.average} 分，最高 ${analysis.best} 分，最低 ${analysis.worst} 分。薄弱项：${analysis.weakType || "暂无"}。<br>${typeText}`;
    }

    function render() {
      renderStats();
      renderQuestion();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => setView(button.dataset.view));
    });

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => setFilter(button.dataset.filter));
    });

    document.querySelectorAll("[data-source]").forEach((button) => {
      button.addEventListener("click", () => setSource(button.dataset.source));
    });

    document.querySelectorAll("[data-exam-source]").forEach((button) => {
      button.addEventListener("click", () => setExamSource(button.dataset.examSource));
    });

    els.startExamButton.addEventListener("click", startExam);

    els.submitButton.addEventListener("click", () => {
      if (state.view === "exam" && state.exam.status === "active") {
        if (state.exam.index === state.exam.paper.length - 1) submitExam();
        else goExamQuestion(state.exam.index + 1);
        return;
      }
      if (state.submitted) pickQuestion();
      else submitAnswer();
    });

    els.skipButton.addEventListener("click", () => {
      if (state.view === "exam" && state.exam.status === "active") goExamQuestion(state.exam.index - 1);
      else pickQuestion();
    });
    els.resetButton.addEventListener("click", resetStats);
    els.searchInput.addEventListener("input", (event) => {
      state.search = event.target.value;
      state.orderIndex = 0;
      pickQuestion();
    });


    pickQuestion();
  </script>
</body>
</html>
